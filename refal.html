<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link AutoMixer</title>
    <style>
        /* Gaya dasar aplikasi - modern background */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f4f7; 
            color: #1c1c1e;
            padding: 30px 20px;
            max-width: 800px;
            margin: 0 auto;
            -webkit-tap-highlight-color: transparent; /* Ilangin efek biru pas diklik di HP */
        }
        
        /* Judul Header ala aplikasi native */
        h2 { 
            font-size: 24px; 
            font-weight: 700; 
            margin-bottom: 28px; 
            color: #111; 
            letter-spacing: -0.5px;
            text-align: center;
        }

        /* Kotak Card UI Modern (Soft shadow, no border) */
        .box {
            background: #ffffff;
            padding: 22px;
            border-radius: 18px; 
            margin-bottom: 20px;
            border: none; 
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04); 
        }

        /* Label elegan */
        label { 
            font-weight: 600; 
            display: block; 
            margin-bottom: 12px; 
            font-size: 12px; 
            color: #86868b; 
            text-transform: uppercase; 
            letter-spacing: 0.8px;
        }

        /* Kotak Input kekinian */
        textarea {
            width: 100%;
            height: 110px;
            border: none; 
            border-radius: 14px;
            padding: 16px;
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 13px;
            box-sizing: border-box;
            resize: none; 
            background-color: #f5f5f7; 
            color: #1d1d1f;
            line-height: 1.6;
            transition: all 0.2s ease;
        }

        textarea:focus { 
            outline: none; 
            background-color: #ffffff;
            box-shadow: 0 0 0 2px #007aff; /* Efek ring biru pas ngetik */
        }

        /* Grup Tombol */
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        /* Tombol Utama (Hitam Elegan) */
        button.action-btn {
            flex: 3;
            padding: 16px;
            background-color: #000000; 
            color: #ffffff;
            border: none;
            border-radius: 16px; 
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(0,0,0,0.15);
        }

        /* Efek ditekan */
        button.action-btn:active {
            transform: scale(0.97); 
        }

        /* Tombol Reset (Abu-abu lembut) */
        button.reset-btn {
            flex: 1;
            padding: 16px;
            background-color: #e5e5ea; 
            color: #1c1c1e;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        button.reset-btn:active {
            transform: scale(0.97);
            background-color: #d1d1d6;
        }

        /* Teks Status */
        #status {
            font-weight: 500;
            color: #86868b;
            margin: 24px 0 10px;
            font-size: 14px;
            text-align: center;
        }

        /* Kotak Hasil Racikan */
        .result-day {
            background: #ffffff;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            position: relative;
        }

        .result-day h3 { 
            margin-top: 0; 
            margin-bottom: 14px; 
            font-size: 16px; 
            font-weight: 700; 
            color: #1d1d1f;
        }

        /* Teks Hasil */
        .result-text {
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            white-space: pre-wrap;
            line-height: 1.6;
            color: #333;
            font-size: 13px;
            background: #f5f5f7;
            padding: 14px;
            border-radius: 12px;
        }

        /* Tombol Copy (Bentuk Pill/Kapsul) */
        .copy-btn {
            background-color: #007aff;
            color: #ffffff;
            border: none;
            border-radius: 20px; 
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            position: absolute;
            top: 18px;
            right: 20px;
            transition: all 0.15s;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
        }

        .copy-btn:active { 
            transform: scale(0.92);
            background-color: #005bb5; 
        }
    </style>
</head>
<body>

    <h2>Link AutoMixer</h2>

    <div class="box">
        <label>Shopee Links Configuration</label>
        <textarea id="inputShopee" placeholder="Enter Shopee links..."></textarea>
    </div>

    <div class="box">
        <label>Source URLs Extraction</label>
        <textarea id="inputTweet" placeholder="Enter source URLs..."></textarea>
    </div>

    <div class="button-group">
        <button class="action-btn" onclick="generateAll()">Process Links</button>
        <button class="reset-btn" onclick="resetForm()">Reset</button>
    </div>

    <div id="status"></div>

    <div id="outputContainer"></div>

    <script>
        async function generateAll() {
            let shopeeRaw = document.getElementById('inputShopee').value.split('\n').map(s => s.trim()).filter(s => s !== '');
            let tweetUrls = document.getElementById('inputTweet').value.split('\n').map(s => s.trim()).filter(s => s !== '');

            let status = document.getElementById('status');
            let outputDiv = document.getElementById('outputContainer');
            
            if (shopeeRaw.length === 0 || tweetUrls.length === 0) {
                alert("Please fill in both fields.");
                return;
            }

            status.innerHTML = "Processing data...";
            outputDiv.innerHTML = '';
            
            let finalVideoLinks = new Set(); 

            for (let url of tweetUrls) {
                try {
                    let apiUrl = url.trim().replace(/(https?:\/\/)?(www\.)?(twitter\.com|x\.com)/, 'https://api.vxtwitter.com').split('?')[0];
                    let response = await fetch(apiUrl);
                    if (!response.ok) continue;
                    
                    let data = await response.json();
                    let fullText = data.text;
                    let urlRegex = /(https?:\/\/[^\s]+)/g;
                    let foundUrls = fullText.match(urlRegex) || [];

                    foundUrls.forEach(u => {
                        if (u.includes('aceimg.com/upload/')) {
                            let cleanUrl = u.replace(/["']/g, "").trim();
                            let id = cleanUrl.split('?f=')[1]; 
                            if(id) {
                                finalVideoLinks.add("cdnpro.vercel.app/a/" + id); 
                            }
                        }
                    });
                } catch (e) { console.log("Failed to process: " + url); }
            }

            let videoArray = Array.from(finalVideoLinks);

            if (videoArray.length === 0) {
                status.innerHTML = "Process completed. No valid source URLs found.";
                return;
            }

            status.innerHTML = `Process completed. Extracted ${videoArray.length} items.`;

            let resultHTML = '';
            let dayCounter = 1;
            let shopeeIndex = 0;

            for(let i = 0; i < videoArray.length; i += 2) {
                let vid1 = videoArray[i];
                let vid2 = (i + 1 < videoArray.length) ? videoArray[i+1] : ''; 

                let shop1 = shopeeRaw[shopeeIndex % shopeeRaw.length];
                let shop2 = shopeeRaw[(shopeeIndex + 1) % shopeeRaw.length];
                shopeeIndex += 2; 

                let racikanText = vid1 + '\n' + shop1 + '\n' + shop2;
                if(vid2 !== '') racikanText += '\n' + vid2;

                resultHTML += `
                <div class="result-day">
                    <h3>Batch ${dayCounter}</h3>
                    <button class="copy-btn" onclick="copyToClipboard(this, \`${racikanText}\`)">Copy</button>
                    <div class="result-text">${racikanText}</div>
                </div>`;
                
                dayCounter++;
            }

            outputDiv.innerHTML = resultHTML;
        }

        function resetForm() {
            document.getElementById('inputShopee').value = '';
            document.getElementById('inputTweet').value = '';
            document.getElementById('status').innerHTML = '';
            document.getElementById('outputContainer').innerHTML = '';
        }

        function copyToClipboard(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                let originalText = btn.innerText;
                btn.innerText = "Copied";
                setTimeout(() => {
                    btn.innerText = originalText;
                }, 1500);
            });
        }
    </script>
</body>
</html>

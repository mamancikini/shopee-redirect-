<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Link AutoMixer</title>
    
    <!-- Import Google Fonts & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

    <style>
        :root {
            /* Material You - Dark Theme Palette (Based on your screenshots) */
            --md-bg: #1d1819;
            --md-surface: #2b2224;
            --md-on-surface: #ece0e2;
            --md-on-surface-variant: #d0c3c6;
            --md-primary: #ffb1c8;
            --md-primary-container: #7d2d49;
            --md-on-primary-container: #ffd9e2;
            --md-secondary-container: #423136;
            --md-outline: #857377;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--md-bg); 
            color: var(--md-on-surface);
            padding: 0;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 90px; /* Space for bottom nav */
        }

        /* Top App Bar */
        .app-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            background-color: var(--md-bg);
            z-index: 10;
        }

        .app-bar h2 { 
            font-size: 22px; 
            font-weight: 500; 
            margin: 0; 
            color: var(--md-on-surface); 
            letter-spacing: 0px;
        }

        /* Main Container */
        .main-content {
            padding: 10px 20px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Tab System */
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Google Style Cards */
        .box {
            background: var(--md-surface);
            padding: 20px;
            border-radius: 24px; 
            margin-bottom: 16px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        label { 
            font-weight: 500; 
            font-size: 14px; 
            color: var(--md-on-surface-variant); 
        }

        /* Pill Buttons */
        .paste-btn {
            background-color: var(--md-secondary-container);
            color: var(--md-on-surface);
            border: none;
            border-radius: 100px; /* Google Pill style */
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .paste-btn:active { background-color: #5c444b; }
        .paste-btn .material-symbols-rounded { font-size: 18px; }

        /* Input Fields */
        textarea {
            width: 100%;
            height: 110px;
            border: none; 
            border-radius: 16px;
            padding: 16px;
            font-family: ui-monospace, monospace;
            font-size: 14px;
            box-sizing: border-box;
            resize: none; 
            background-color: var(--md-secondary-container); 
            color: var(--md-on-surface);
            line-height: 1.6;
        }
        textarea:focus { outline: 2px solid var(--md-primary); background-color: #37292d; }
        textarea::placeholder { color: #8f7f83; }

        /* Action Buttons */
        .button-group { display: flex; gap: 12px; margin-top: 10px; }

        button.action-btn {
            flex: 3;
            padding: 16px;
            background-color: var(--md-primary-container); 
            color: var(--md-on-primary-container);
            border: none;
            border-radius: 100px; 
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button.action-btn:active { opacity: 0.8; }

        button.reset-btn {
            flex: 1;
            padding: 16px;
            background-color: transparent; 
            color: var(--md-primary);
            border: 1px solid var(--md-outline);
            border-radius: 100px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }
        button.reset-btn:active { background-color: var(--md-secondary-container); }

        button.save-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--md-primary);
            color: #3e001c;
            border: none;
            border-radius: 100px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 20px;
            display: none;
        }

        #status { font-weight: 400; color: var(--md-on-surface-variant); margin: 20px 0 16px; font-size: 14px; text-align: center; }

        /* Result Cards */
        .result-day {
            background: var(--md-surface);
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 24px;
            position: relative;
        }

        .result-day h3 { 
            margin-top: 0; 
            margin-bottom: 16px; 
            font-size: 18px; 
            font-weight: 500; 
            color: var(--md-on-surface); 
            display: flex;
            align-items: center;
        }

        .posted-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 500;
            color: var(--md-on-surface-variant);
            cursor: pointer;
            margin-left: 12px;
            background: var(--md-secondary-container);
            padding: 6px 12px;
            border-radius: 8px;
        }
        .posted-toggle input[type="checkbox"] { accent-color: var(--md-primary); width: 16px; height: 16px; }
        .posted-toggle input[type="checkbox"]:checked + span { color: var(--md-primary); text-decoration: line-through; }

        .result-text {
            font-family: ui-monospace, monospace;
            font-size: 13px;
            line-height: 24px;
            color: var(--md-on-surface);
            background: var(--md-secondary-container);
            padding: 16px;
            border-radius: 16px;
            white-space: pre-wrap;
            word-break: break-all;
            margin-bottom: 16px;
        }

        .post-x-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--md-primary-container); 
            color: var(--md-on-primary-container);
            border: none;
            border-radius: 100px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .post-x-btn .material-symbols-rounded { font-size: 20px; }

        .copy-btn {
            background-color: var(--md-secondary-container);
            color: var(--md-on-surface);
            border: none;
            border-radius: 100px; 
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .copy-btn .material-symbols-rounded { font-size: 16px; }

        /* History Tab Styles */
        .history-item {
            background: var(--md-surface);
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-info { font-size: 16px; font-weight: 500; color: var(--md-on-surface); }
        .history-date { font-size: 13px; color: var(--md-on-surface-variant); margin-top: 6px; }
        .history-actions { display: flex; gap: 8px; }
        .hist-btn {
            border: none; padding: 10px; border-radius: 100px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .load-h { background-color: var(--md-secondary-container); color: var(--md-on-surface); }
        .del-h { background-color: #59191f; color: #ffb4ab; }

        /* Bottom Navigation (Google Ecosystem Style) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background-color: var(--md-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            width: 64px;
            cursor: pointer;
            color: var(--md-on-surface-variant);
        }

        .nav-icon-wrapper {
            width: 64px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px; /* Pill shape for active icon */
            transition: background-color 0.2s;
        }

        .nav-item .material-symbols-rounded { font-size: 24px; }
        .nav-item span { font-size: 12px; font-weight: 500; }

        /* Active State for Nav */
        .nav-item.active { color: var(--md-on-surface); }
        .nav-item.active .nav-icon-wrapper { background-color: var(--md-primary-container); color: var(--md-on-primary-container); }
        .nav-item.active .material-symbols-rounded { font-variation-settings: 'FILL' 1; } /* Filled icon when active */

    </style>
</head>
<body>

    <header class="app-bar">
        <h2>Link AutoMixer</h2>
    </header>

    <main class="main-content">
        
        <!-- BERANDA TAB -->
        <div id="tab-home" class="tab-content active">
            <div class="box">
                <div class="header-row">
                    <label>Shopee Links</label>
                    <button class="paste-btn" onclick="pasteToBox('inputShopee', this)">
                        <span class="material-symbols-rounded">content_paste</span>
                        <span>Tempel</span>
                    </button>
                </div>
                <textarea id="inputShopee" placeholder="Masukkan link Shopee di sini..."></textarea>
            </div>

            <div class="box">
                <div class="header-row">
                    <label>Source URLs (X)</label>
                    <button class="paste-btn" onclick="pasteToBox('inputTweet', this)">
                        <span class="material-symbols-rounded">content_paste</span>
                        <span>Tempel</span>
                    </button>
                </div>
                <textarea id="inputTweet" placeholder="Masukkan link cuitan di sini..."></textarea>
            </div>

            <div class="button-group">
                <button class="action-btn" onclick="generateAll()">Proses Links</button>
                <button class="reset-btn" onclick="resetForm()">Reset</button>
            </div>

            <div id="status"></div>

            <button id="saveBtn" class="save-btn" onclick="saveCurrentToHistory()">Simpan ke File</button>

            <div id="outputContainer"></div>
        </div>

        <!-- HISTORI / FILE TAB -->
        <div id="tab-history" class="tab-content">
            <div id="historyContainer"></div>
        </div>

    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home')" id="nav-home">
            <div class="nav-icon-wrapper">
                <span class="material-symbols-rounded">home</span>
            </div>
            <span>Beranda</span>
        </div>
        <div class="nav-item" onclick="switchTab('history')" id="nav-history">
            <div class="nav-icon-wrapper">
                <span class="material-symbols-rounded">folder</span>
            </div>
            <span>File</span>
        </div>
    </nav>

    <script>
        // --- UI LOGIC (TAB SWITCHING) ---
        function switchTab(tabName) {
            // Sembunyikan semua tab
            document.getElementById('tab-home').classList.remove('active');
            document.getElementById('tab-history').classList.remove('active');
            
            // Reset navigasi bawah
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('nav-history').classList.remove('active');
            
            // Aktifkan tab yang dipilih
            document.getElementById('tab-' + tabName).classList.add('active');
            document.getElementById('nav-' + tabName).classList.add('active');

            // Scroll ke atas saat ganti tab
            window.scrollTo(0, 0);
        }

        // --- ORIGINAL APP LOGIC (TIDAK ADA YANG DIUBAH) ---
        let currentActiveResultHTML = '';
        let currentActiveItemsCount = 0;
        let lastLengthShopee = 0;
        let lastLengthTweet = 0;
        let currentActiveHistoryId = null;

        window.onload = function() {
            renderHistory();
            
            let sInput = document.getElementById('inputShopee');
            let tInput = document.getElementById('inputTweet');

            let draftShopee = localStorage.getItem('draft_shopee');
            if(draftShopee && sInput) sInput.value = draftShopee;

            let draftTweet = localStorage.getItem('draft_tweet');
            if(draftTweet && tInput) tInput.value = draftTweet;

            let draftResult = localStorage.getItem('draft_result');
            let draftCount = localStorage.getItem('draft_count');
            let savedHistoryId = localStorage.getItem('draft_history_id');

            if(draftResult) {
                document.getElementById('outputContainer').innerHTML = draftResult;
                currentActiveResultHTML = draftResult;
                currentActiveItemsCount = parseInt(draftCount || '0');
                if (savedHistoryId) currentActiveHistoryId = parseInt(savedHistoryId);
                
                document.getElementById('saveBtn').style.display = 'block';
                document.getElementById('status').innerHTML = "Data recovered from previous session.";
            }

            if (sInput) {
                lastLengthShopee = sInput.value.length;
                sInput.addEventListener('input', function() {
                    let currentLength = this.value.length;
                    if (currentLength - lastLengthShopee > 10) {
                        if (!this.value.endsWith('\n')) {
                            this.value += '\n';
                        }
                        this.scrollTop = this.scrollHeight;
                    }
                    lastLengthShopee = this.value.length;
                    localStorage.setItem('draft_shopee', this.value);
                });
            }

            if (tInput) {
                lastLengthTweet = tInput.value.length;
                tInput.addEventListener('input', function() {
                    let currentLength = this.value.length;
                    if (currentLength - lastLengthTweet > 10) {
                        if (!this.value.endsWith('\n')) {
                            this.value += '\n';
                        }
                        this.scrollTop = this.scrollHeight;
                    }
                    lastLengthTweet = this.value.length;
                    localStorage.setItem('draft_tweet', this.value);
                });
            }
        };

        function toggleDone(checkbox) {
            if (checkbox.checked) {
                checkbox.setAttribute('checked', 'checked'); 
            } else {
                checkbox.removeAttribute('checked'); 
            }

            let outputContainer = document.getElementById('outputContainer');
            currentActiveResultHTML = outputContainer.innerHTML;
            localStorage.setItem('draft_result', currentActiveResultHTML); 

            if (currentActiveHistoryId) {
                let history = JSON.parse(localStorage.getItem('refal_history')) || [];
                let index = history.findIndex(item => item.id === currentActiveHistoryId);
                if (index !== -1) {
                    history[index].html = currentActiveResultHTML;
                    localStorage.setItem('refal_history', JSON.stringify(history));
                }
            }
        }

        async function pasteToBox(targetId, btnElement) {
            try {
                if (!navigator.clipboard || !navigator.clipboard.readText) {
                    alert("Browser kamu tidak mendukung fitur Tempel otomatis. Silakan tahan kotaknya lalu pilih 'Tempel' secara manual.");
                    return;
                }
                
                let text = await navigator.clipboard.readText();
                if (text) {
                    let sInput = document.getElementById('inputShopee');
                    let tInput = document.getElementById('inputTweet');
                    let targetTextarea;

                    if (text.includes('x.com/') || text.includes('twitter.com/')) {
                        targetTextarea = tInput;
                    } else {
                        targetTextarea = sInput;
                    }

                    if (targetTextarea.value.trim() !== '') {
                        targetTextarea.value += '\n' + text;
                    } else {
                        targetTextarea.value = text;
                    }
                    
                    targetTextarea.dispatchEvent(new Event('input'));

                    let originalBg = btnElement.style.backgroundColor;
                    let span = btnElement.querySelectorAll('span')[1];
                    let icon = btnElement.querySelectorAll('span')[0];
                    
                    btnElement.style.backgroundColor = 'var(--md-primary-container)';
                    btnElement.style.color = 'var(--md-on-primary-container)';
                    icon.innerText = 'check';
                    span.innerText = 'Masuk!';
                    
                    setTimeout(() => { 
                        btnElement.style.backgroundColor = originalBg; 
                        btnElement.style.color = 'var(--md-on-surface)';
                        icon.innerText = 'content_paste';
                        span.innerText = 'Tempel';
                    }, 800);
                }
            } catch (err) {
                alert("Izin ditolak! Buka ikon gembok 🔒 di samping link web di atas, pilih 'Izin' (Permissions), dan nyalakan Papan Klip (Clipboard).");
            }
        }

        function shareToX(btn) {
            let racikanText = decodeURIComponent(btn.getAttribute('data-text'));
            if (navigator.share) {
                navigator.share({
                    text: racikanText
                }).catch((error) => console.log('Batal share:', error));
            } else {
                let intentUrl = `intent:#Intent;action=android.intent.action.SEND;type=text/plain;S.android.intent.extra.TEXT=${btn.getAttribute('data-text')};end`;
                window.location.href = intentUrl;
            }
        }

        async function generateAll() {
            let status = document.getElementById('status');
            let outputDiv = document.getElementById('outputContainer');
            let saveBtn = document.getElementById('saveBtn');
            let sInput = document.getElementById('inputShopee');
            let tInput = document.getElementById('inputTweet');

            if (!sInput || !tInput) {
                alert("Error: Kotak teks tidak ditemukan.");
                return;
            }

            let shopeeRaw = sInput.value.split('\n').map(s => s.trim()).filter(s => s !== '');
            let rawTweetInput = tInput.value;
            let tweetUrls = rawTweetInput.match(/(https?:\/\/[^\s]+)/g) || [];

            if (shopeeRaw.length === 0 || tweetUrls.length === 0) {
                alert("Silakan isi kedua kotak teks.");
                return;
            }

            status.innerHTML = "Memproses data...";
            outputDiv.innerHTML = '';
            saveBtn.style.display = 'none';
            currentActiveHistoryId = null; 
            localStorage.removeItem('draft_history_id');
            
            let resultHTML = '';
            let dayCounter = 1;
            let shopeeIndex = 0;
            let seenBatches = new Set(); 

            for (let url of tweetUrls) {
                try {
                    let apiUrl = url.trim().replace(/(https?:\/\/)?(www\.)?(twitter\.com|x\.com)/, 'https://api.vxtwitter.com').split('?')[0];
                    let response;
                    
                    try {
                        response = await fetch(apiUrl);
                        if (!response.ok) throw new Error("Gagal jalur utama");
                    } catch (err) {
                        let proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(apiUrl);
                        response = await fetch(proxyUrl);
                    }

                    if (!response || !response.ok) continue;
                    
                    let data = await response.json();
                    let fullText = data.text;
                    let urlRegex = /(https?:\/\/[^\s]+)/g;
                    let foundUrls = fullText.match(urlRegex) || [];

                    let caption = fullText.replace(urlRegex, '').trim();

                    if (foundUrls.length > 0) {
                        let batchLinksData = [];

                        foundUrls.forEach(u => {
                            let cleanUrl = u.replace(/["']/g, "").trim();

                            if (cleanUrl.includes('aceimg.com/upload/')) {
                                let id = cleanUrl.split('?f=')[1]; 
                                if(id) {
                                    batchLinksData.push({ url: "cdnpro.vercel.app/a/" + id, type: "vid" }); 
                                }
                            } else {
                                let myShopee = shopeeRaw[shopeeIndex % shopeeRaw.length];
                                batchLinksData.push({ url: myShopee, type: "shop" });
                                shopeeIndex++; 
                            }
                        });

                        if (batchLinksData.length > 0) {
                            let plainTextArr = [];

                            if (caption !== '') {
                                plainTextArr.push(caption);
                            }

                            batchLinksData.forEach((item, idx) => {
                                plainTextArr.push(item.url);
                            });

                            let racikanText = plainTextArr.join('\n'); 
                            let encodedTweetText = encodeURIComponent(racikanText);

                            if (!seenBatches.has(racikanText)) {
                                seenBatches.add(racikanText);

                                resultHTML += `
                                <div class="result-day">
                                    <h3>
                                        Batch ${dayCounter}
                                        <label class="posted-toggle">
                                            <input type="checkbox" onchange="toggleDone(this)">
                                            <span>Posted</span>
                                        </label>
                                    </h3>
                                    <button class="copy-btn" onclick="copyToClipboard(this, \`${racikanText}\`)">
                                        <span class="material-symbols-rounded">content_copy</span> Copy
                                    </button>
                                    
                                    <div class="result-text">${racikanText}</div>
                                    
                                    <button class="post-x-btn" onclick="shareToX(this)" data-text="${encodedTweetText}">
                                        <span class="material-symbols-rounded">share</span> Share ke X
                                    </button>
                                </div>`;
                                
                                dayCounter++;
                            }
                        }
                    }
                } catch (e) { console.log("Failed to process: " + url); }
            }

            let totalBatches = dayCounter - 1;

            if (totalBatches === 0) {
                status.innerHTML = "Proses selesai. Tidak ada URL valid.";
                return;
            }

            status.innerHTML = `Proses selesai. Berhasil membuat ${totalBatches} batch.`;
            outputDiv.innerHTML = resultHTML;
            
            currentActiveResultHTML = resultHTML;
            currentActiveItemsCount = totalBatches;
            saveBtn.style.display = 'block';

            localStorage.setItem('draft_result', resultHTML);
            localStorage.setItem('draft_count', totalBatches);
        }

        function saveCurrentToHistory() {
            if (!currentActiveResultHTML) return;
            
            let history = JSON.parse(localStorage.getItem('refal_history')) || [];
            let timestamp = new Date().toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
            
            let newRecord = {
                id: Date.now(),
                date: timestamp,
                count: currentActiveItemsCount,
                html: currentActiveResultHTML
            };
            
            history.unshift(newRecord); 
            localStorage.setItem('refal_history', JSON.stringify(history));
            
            currentActiveHistoryId = newRecord.id; 
            localStorage.setItem('draft_history_id', newRecord.id);

            document.getElementById('saveBtn').style.display = 'none';
            renderHistory();
            
            // Otomatis pindah ke tab File setelah save
            switchTab('history');
        }

        function renderHistory() {
            let history = JSON.parse(localStorage.getItem('refal_history')) || [];
            let container = document.getElementById('historyContainer');
            
            if (history.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding: 60px 20px; color: var(--md-on-surface-variant);">
                        <span class="material-symbols-rounded" style="font-size: 64px; opacity: 0.5; margin-bottom: 16px; display:block;">folder_open</span>
                        <h3 style="margin:0; font-size:18px; font-weight:500; color:var(--md-on-surface);">Tempat untuk file Anda</h3>
                        <p style="font-size:14px; margin-top:8px;">Belum ada history racikan link yang disimpan.</p>
                    </div>`;
                return;
            }
            
            let html = '<h2 style="font-size:18px; margin-bottom:20px; font-weight:500;">File History</h2>';
            history.forEach(item => {
                html += `
                <div class="history-item">
                    <div>
                        <div class="history-info">Batch Record (${item.count} Items)</div>
                        <div class="history-date">${item.date}</div>
                    </div>
                    <div class="history-actions">
                        <button class="hist-btn load-h" onclick="loadHistoryItem(${item.id})">
                            <span class="material-symbols-rounded">open_in_new</span>
                        </button>
                        <button class="hist-btn del-h" onclick="deleteHistoryItem(${item.id})">
                            <span class="material-symbols-rounded">delete</span>
                        </button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function loadHistoryItem(id) {
            let history = JSON.parse(localStorage.getItem('refal_history')) || [];
            let record = history.find(item => item.id === id);
            if (record) {
                document.getElementById('status').innerHTML = `Membuka data dari File (${record.date})`;
                document.getElementById('outputContainer').innerHTML = record.html;
                document.getElementById('saveBtn').style.display = 'none';
                
                currentActiveResultHTML = record.html;
                currentActiveItemsCount = record.count;
                currentActiveHistoryId = id; 
                
                localStorage.setItem('draft_result', record.html);
                localStorage.setItem('draft_count', record.count);
                localStorage.setItem('draft_history_id', id);
                
                // Balik ke Beranda buat liat isinya
                switchTab('home');
                
                // Kasih delay dikit biar mulus pas scroll
                setTimeout(() => {
                    document.getElementById('outputContainer').scrollIntoView({ behavior: 'smooth' });
                }, 100);
            }
        }

        function deleteHistoryItem(id) {
            if(confirm("Hapus file history ini secara permanen?")) {
                let history = JSON.parse(localStorage.getItem('refal_history')) || [];
                history = history.filter(item => item.id !== id);
                localStorage.setItem('refal_history', JSON.stringify(history));
                renderHistory();
            }
        }

        function resetForm() {
            document.getElementById('inputShopee').value = '';
            document.getElementById('inputTweet').value = '';
            document.getElementById('status').innerHTML = '';
            document.getElementById('outputContainer').innerHTML = '';
            document.getElementById('saveBtn').style.display = 'none';
            
            currentActiveResultHTML = '';
            currentActiveItemsCount = 0;
            currentActiveHistoryId = null; 
            
            localStorage.removeItem('draft_shopee');
            localStorage.removeItem('draft_tweet');
            localStorage.removeItem('draft_result');
            localStorage.removeItem('draft_count');
            localStorage.removeItem('draft_history_id');
        }

        function copyToClipboard(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                let originalHtml = btn.innerHTML;
                btn.innerHTML = `<span class="material-symbols-rounded">check</span> Copied`;
                
                btn.style.backgroundColor = "var(--md-primary)"; 
                btn.style.color = "#3e001c";
                
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.style.backgroundColor = ""; 
                    btn.style.color = "";
                }, 1500);
            });
        }
    </script>
</body>
</html>

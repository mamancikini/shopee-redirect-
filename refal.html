<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link AutoMixer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f4f7; 
            color: #1c1c1e;
            padding: 30px 20px;
            max-width: 800px;
            margin: 0 auto;
            -webkit-tap-highlight-color: transparent;
        }
        
        h2 { font-size: 24px; font-weight: 700; margin-bottom: 28px; color: #111; letter-spacing: -0.5px; text-align: center; }

        .box { background: #ffffff; padding: 22px; border-radius: 18px; margin-bottom: 20px; border: none; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04); }

        label { font-weight: 600; display: block; margin-bottom: 12px; font-size: 12px; color: #86868b; text-transform: uppercase; letter-spacing: 0.8px; }

        textarea {
            width: 100%; height: 110px; border: none; border-radius: 14px; padding: 16px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 13px; box-sizing: border-box; resize: none; background-color: #f5f5f7; color: #1d1d1f; line-height: 1.6; transition: all 0.2s ease;
        }

        textarea:focus { outline: none; background-color: #ffffff; box-shadow: 0 0 0 2px #007aff; }

        .button-group { display: flex; gap: 12px; margin-top: 24px; }

        button.action-btn { flex: 3; padding: 16px; background-color: #000000; color: #ffffff; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s; box-shadow: 0 4px 14px rgba(0,0,0,0.15); }
        button.action-btn:active { transform: scale(0.97); }

        button.reset-btn { flex: 1; padding: 16px; background-color: #e5e5ea; color: #1c1c1e; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
        button.reset-btn:active { transform: scale(0.97); background-color: #d1d1d6; }

        button.save-btn { width: 100%; padding: 14px; background-color: #34c759; color: white; border: none; border-radius: 14px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 20px; display: none; transition: transform 0.1s; box-shadow: 0 4px 12px rgba(52, 199, 89, 0.2); }
        button.save-btn:active { transform: scale(0.98); }

        .result-day { background: #ffffff; padding: 20px; margin-bottom: 16px; border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); position: relative; }
        
        .result-body { display: flex; gap: 12px; margin-bottom: 14px; }

        .result-text { flex: 1; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 13px; line-height: 28px; color: #333; background: #f5f5f7; padding: 12px 14px; border-radius: 12px; white-space: pre-wrap; word-break: break-all; margin: 0; }

        .test-side-panel { display: flex; flex-direction: column; gap: 6px; padding: 12px 0; }
        
        .test-btn { width: 45px; height: 22px; padding: 0; border-radius: 6px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; transition: transform 0.1s; display: flex; align-items: center; justify-content: center; }
        .test-btn:active { transform: scale(0.92); }
        .btn-vid { background-color: #e5f1ff; color: #007aff; }
        .btn-shop { background-color: #fff0e6; color: #ff6b00; }

        .post-x-btn { width: 100%; padding: 12px; background-color: #1da1f2; color: #ffffff; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: transform 0.1s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .post-x-btn:active { transform: scale(0.96); background-color: #1a91da; }

        .copy-btn { background-color: #007aff; color: #ffffff; border: none; border-radius: 20px; padding: 6px 16px; font-size: 12px; font-weight: 600; cursor: pointer; position: absolute; top: 18px; right: 20px; transition: all 0.15s; }
        .copy-btn:active { transform: scale(0.92); }
    </style>
</head>
<body>

    <h2>Link AutoMixer</h2>

    <div class="box">
        <label>Shopee Links Configuration</label>
        <textarea id="inputShopee" placeholder="Enter Shopee links..."></textarea>
    </div>

    <div class="box">
        <label>Source URLs Extraction</label>
        <textarea id="inputTweet" placeholder="Enter source URLs..."></textarea>
    </div>

    <div class="button-group">
        <button class="action-btn" onclick="generateAll()">Process Links</button>
        <button class="reset-btn" onclick="resetForm()">Reset</button>
    </div>

    <div id="outputContainer"></div>

    <script>
        let shopeeInput = document.getElementById('inputShopee');
        let tweetInput = document.getElementById('inputTweet');
        
        window.onload = function() {
            if(localStorage.getItem('draft_shopee')) shopeeInput.value = localStorage.getItem('draft_shopee');
            if(localStorage.getItem('draft_tweet')) tweetInput.value = localStorage.getItem('draft_tweet');
            if(localStorage.getItem('draft_result')) document.getElementById('outputContainer').innerHTML = localStorage.getItem('draft_result');
        };

        shopeeInput.addEventListener('input', () => localStorage.setItem('draft_shopee', shopeeInput.value));
        tweetInput.addEventListener('input', () => localStorage.setItem('draft_tweet', tweetInput.value));

        // JALUR INTENT VIP (LANGSUNG KE TWITTER)
        function postToTwitter(text) {
            let encodedText = encodeURIComponent(text);
            // Intent ini yang ngebuka Twitter + ngisi teksnya
            let intent = `intent:#Intent;action=android.intent.action.SEND;type=text/plain;S.android.intent.extra.TEXT=${encodedText};package=com.twitter.android;end`;
            window.location.href = intent;
        }

        async function generateAll() {
            let shopeeRaw = shopeeInput.value.split('\n').filter(s => s.trim() !== '');
            let tweetUrls = tweetInput.value.match(/(https?:\/\/[^\s]+)/g) || [];
            let outputDiv = document.getElementById('outputContainer');
            
            outputDiv.innerHTML = 'Processing...';
            
            let resultHTML = '';
            let shopeeIndex = 0;

            for (let url of tweetUrls) {
                let response = await fetch('https://api.vxtwitter.com/' + url.split('status/')[1].split('?')[0]);
                let data = await response.json();
                let batchLinks = [];

                data.text.match(/(https?:\/\/[^\s]+)/g)?.forEach(u => {
                    if (u.includes('aceimg.com/upload/')) {
                        let id = u.split('?f=')[1];
                        batchLinks.push({ url: "cdnpro.vercel.app/a/" + id, type: "vid" });
                    } else {
                        batchLinks.push({ url: shopeeRaw[shopeeIndex++ % shopeeRaw.length], type: "shop" });
                    }
                });

                let racikanText = batchLinks.map(b => b.url).join('\n');
                let buttons = batchLinks.map((b, i) => `<button class="test-btn ${b.type === 'vid' ? 'btn-vid' : 'btn-shop'}" onclick="window.location.href='${b.url}'">${b.type === 'vid' ? 'V' : 'S'}${i+1}</button>`).join('');

                resultHTML += `
                <div class="result-day">
                    <button class="copy-btn" onclick="copyToClipboard(this, \`${racikanText}\`)">Copy</button>
                    <div class="result-body">
                        <div class="result-text">${racikanText}</div>
                        <div class="test-side-panel">${buttons}</div>
                    </div>
                    <button class="post-x-btn" onclick="postToTwitter(\`${racikanText}\`)">Post ke X</button>
                </div>`;
            }

            outputDiv.innerHTML = resultHTML;
            localStorage.setItem('draft_result', resultHTML);
        }

        function copyToClipboard(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                btn.innerText = "Copied ✓";
                setTimeout(() => btn.innerText = "Copy", 1500);
            });
        }

        function resetForm() {
            shopeeInput.value = ''; tweetInput.value = ''; outputDiv.innerHTML = '';
            localStorage.clear();
        }
    </script>
</body>
</html>

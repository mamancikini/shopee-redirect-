<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Link AutoMixer</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

    <style>
        :root {
            /* Palette 100% akurat dari screenshot Google One lu */
            --md-bg: #1d1819;
            --md-surface: #2b2224;
            --md-on-surface: #f1dfe2;
            --md-on-surface-variant: #d3c2c5;
            --md-primary: #ffb1c8;
            --md-primary-container: #772b46;
            --md-on-primary-container: #ffd9e2;
            --md-secondary-container: #423136;
            --md-outline: #857377;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--md-bg); 
            color: var(--md-on-surface);
            padding: 0;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 100px; 
        }

        /* Teks Elegan ala Google */
        h1, h2, h3, label, .nav-item span {
            font-family: 'Google Sans', 'Outfit', sans-serif;
        }

        /* Top App Bar (Mirip Header Google One) */
        .app-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            position: sticky;
            top: 0;
            background-color: var(--md-bg);
            z-index: 10;
        }

        .app-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .app-bar h2 { 
            font-size: 22px; 
            font-weight: 500; 
            margin: 0; 
            color: var(--md-on-surface); 
        }

        .app-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--md-on-surface-variant);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .icon-btn:active { background-color: var(--md-secondary-container); }
        .icon-btn.active { color: var(--md-primary); }

        .profile-pic {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #8c737a;
            color: #3e282f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            font-family: 'Google Sans', 'Outfit', sans-serif;
        }

        /* Main Container */
        .main-content {
            padding: 10px 24px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Hero Text (Tulisan Gede ala Google One) */
        .hero {
            text-align: center;
            margin-bottom: 32px;
            margin-top: 16px;
            animation: fadeIn 0.4s ease;
        }
        .hero h1 {
            font-size: 26px;
            font-weight: 500;
            line-height: 1.3;
            margin: 0 0 12px 0;
            color: var(--md-on-surface);
        }
        .hero p {
            font-size: 14px;
            color: var(--md-on-surface-variant);
            margin: 0;
            line-height: 1.5;
        }

        /* Tab System */
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Google One Style Cards (Kotak Clean) */
        .box {
            background: var(--md-surface);
            padding: 24px;
            border-radius: 28px; /* Melengkung banget ala Google */
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }

        .box label { 
            font-weight: 500; 
            font-size: 16px; 
            color: var(--md-on-surface); 
            margin-bottom: 8px;
        }

        /* Textarea Clean (Menyatu dengan Card) */
        textarea {
            width: 100%;
            height: 90px;
            border: none; 
            background-color: transparent; 
            color: var(--md-on-surface-variant);
            font-family: ui-monospace, monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none; 
            padding: 0;
        }
        textarea:focus { outline: none; color: var(--md-on-surface); }
        textarea::placeholder { color: #857377; }

        /* Action Buttons */
        .button-group { display: flex; gap: 12px; margin-top: 16px; }

        button.action-btn {
            flex: 3;
            padding: 16px;
            background-color: var(--md-primary-container); 
            color: var(--md-on-primary-container);
            border: none;
            border-radius: 100px; 
            font-size: 16px;
            font-weight: 500;
            font-family: 'Google Sans', 'Outfit', sans-serif;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button.action-btn:active { opacity: 0.8; }

        button.reset-btn {
            flex: 1;
            padding: 16px;
            background-color: transparent; 
            color: var(--md-on-surface-variant);
            border: 1px solid var(--md-outline);
            border-radius: 100px;
            font-size: 16px;
            font-weight: 500;
            font-family: 'Google Sans', 'Outfit', sans-serif;
            cursor: pointer;
        }
        button.reset-btn:active { background-color: var(--md-secondary-container); }

        button.save-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--md-primary);
            color: #3e001c;
            border: none;
            border-radius: 100px;
            font-size: 15px;
            font-weight: 500;
            font-family: 'Google Sans', 'Outfit', sans-serif;
            cursor: pointer;
            margin-bottom: 20px;
            display: none;
        }

        #status { font-weight: 400; color: var(--md-on-surface-variant); margin: 24px 0 16px; font-size: 14px; text-align: center; }

        /* Result Cards */
        .result-day {
            background: var(--md-surface);
            padding: 24px;
            margin-bottom: 16px;
            border-radius: 28px;
            position: relative;
        }

        .result-day h3 { 
            margin-top: 0; 
            margin-bottom: 16px; 
            font-size: 18px; 
            font-weight: 500; 
            color: var(--md-on-surface); 
            display: flex;
            align-items: center;
        }

        .posted-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--md-on-surface-variant);
            cursor: pointer;
            margin-left: 12px;
            background: var(--md-bg);
            padding: 6px 12px;
            border-radius: 8px;
        }
        .posted-toggle input[type="checkbox"] { accent-color: var(--md-primary); width: 16px; height: 16px; }
        .posted-toggle input[type="checkbox"]:checked + span { color: var(--md-primary); text-decoration: line-through; }

        .result-text {
            font-family: ui-monospace, monospace;
            font-size: 13px;
            line-height: 24px;
            color: var(--md-on-surface);
            background: var(--md-bg);
            padding: 16px;
            border-radius: 16px;
            white-space: pre-wrap;
            word-break: break-all;
            margin-bottom: 16px;
        }

        .post-x-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--md-primary-container); 
            color: var(--md-on-primary-container);
            border: none;
            border-radius: 100px;
            font-size: 15px;
            font-weight: 500;
            font-family: 'Google Sans', 'Outfit', sans-serif;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .post-x-btn .material-symbols-rounded { font-size: 20px; }

        .copy-btn {
            background-color: var(--md-bg);
            color: var(--md-on-surface);
            border: none;
            border-radius: 100px; 
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Google Sans', 'Outfit', sans-serif;
            cursor: pointer;
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .copy-btn .material-symbols-rounded { font-size: 16px; }

        /* History Tab Styles */
        .history-item {
            background: var(--md-surface);
            padding: 24px;
            border-radius: 28px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-info { font-size: 16px; font-weight: 500; color: var(--md-on-surface); font-family: 'Google Sans', 'Outfit', sans-serif; }
        .history-date { font-size: 13px; color: var(--md-on-surface-variant); margin-top: 6px; }
        .history-actions { display: flex; gap: 8px; }
        .hist-btn {
            border: none; padding: 12px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .load-h { background-color: var(--md-bg); color: var(--md-on-surface); }
        .del-h { background-color: #59191f; color: #ffb4ab; }

        /* Bottom Navigation (Google Ecosystem Style) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background-color: var(--md-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            width: 64px;
            cursor: pointer;
            color: var(--md-on-surface-variant);
        }

        .nav-icon-wrapper {
            width: 64px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px; 
            transition: background-color 0.2s;
        }

        .nav-item .material-symbols-rounded { font-size: 24px; }
        .nav-item span { font-size: 12px; font-weight: 500; }

        /* Active State for Nav */
        .nav-item.active { color: var(--md-on-surface); }
        .nav-item.active .nav-icon-wrapper { background-color: var(--md-primary-container); color: var(--md-on-primary-container); }
        .nav-item.active .material-symbols-rounded { font-variation-settings: 'FILL' 1; }

    </style>
</head>
<body>

    <header class="app-bar">
        <div class="app-bar-left">
            <span class="material-symbols-rounded" style="color: var(--md-on-surface-variant);">menu</span>
            <h2>AutoMixer</h2>
        </div>
        <div class="app-bar-right">
            <button id="notifToggleBtn" class="icon-btn" onclick="toggleNotification()" title="Nyalakan Alarm">
                <span class="material-symbols-rounded" id="bellIcon">notifications</span>
            </button>
            <div class="profile-pic">R</div>
        </div>
    </header>

    <main class="main-content">
        
        <div id="tab-home" class="tab-content active">
            
            <div class="hero">
                <h1>Penyederhanaan dan<br>manajemen link Anda</h1>
                <p>Gabungkan link Shopee, kelola ekstraksi cuitan X,<br>dan jadikan satu format yang rapi.</p>
            </div>

            <div class="box">
                <label>Shopee Links</label>
                <textarea id="inputShopee" placeholder="Tempel link Shopee Anda di sini..."></textarea>
            </div>

            <div class="box">
                <label>Source URLs (X)</label>
                <textarea id="inputTweet" placeholder="Tempel link cuitan Anda di sini..."></textarea>
            </div>

            <div class="button-group">
                <button class="action-btn" onclick="generateAll()">Proses Links</button>
                <button class="reset-btn" onclick="resetForm()">Reset</button>
            </div>

            <div id="status"></div>

            <button id="saveBtn" class="save-btn" onclick="saveCurrentToHistory()">Simpan ke File</button>

            <div id="outputContainer"></div>
        </div>

        <div id="tab-history" class="tab-content">
            <div id="historyContainer"></div>
        </div>

    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home')" id="nav-home">
            <div class="nav-icon-wrapper">
                <span class="material-symbols-rounded">home</span>
            </div>
            <span>Beranda</span>
        </div>
        <div class="nav-item" onclick="switchTab('history')" id="nav-history">
            <div class="nav-icon-wrapper">
                <span class="material-symbols-rounded">folder</span>
            </div>
            <span>File</span>
        </div>
    </nav>

    <script>
        // --- UI LOGIC (TAB SWITCHING) ---
        function switchTab(tabName) {
            document.getElementById('tab-home').classList.remove('active');
            document.getElementById('tab-history').classList.remove('active');
            
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('nav-history').classList.remove('active');
            
            document.getElementById('tab-' + tabName).classList.add('active');
            document.getElementById('nav-' + tabName).classList.add('active');

            window.scrollTo(0, 0);
        }

        // --- ORIGINAL APP LOGIC ---
        let currentActiveResultHTML = '';
        let currentActiveItemsCount = 0;
        let lastLengthShopee = 0;
        let lastLengthTweet = 0;
        let currentActiveHistoryId = null;
        let alarmInterval = null;

        window.onload = function() {
            renderHistory();
            checkNotifStatus(); 
            
            let sInput = document.getElementById('inputShopee');
            let tInput = document.getElementById('inputTweet');

            let draftShopee = localStorage.getItem('draft_shopee');
            if(draftShopee && sInput) sInput.value = draftShopee;

            let draftTweet = localStorage.getItem('draft_tweet');
            if(draftTweet && tInput) tInput.value = draftTweet;

            let draftResult = localStorage.getItem('draft_result');
            let draftCount = localStorage.getItem('draft_count');
            let savedHistoryId = localStorage.getItem('draft_history_id');

            if(draftResult) {
                document.getElementById('outputContainer').innerHTML = draftResult;
                currentActiveResultHTML = draftResult;
                currentActiveItemsCount = parseInt(draftCount || '0');
                if (savedHistoryId) currentActiveHistoryId = parseInt(savedHistoryId);
                
                document.getElementById('saveBtn').style.display = 'block';
                document.getElementById('status').innerHTML = "Data recovered from previous session.";
            }

            if (sInput) {
                lastLengthShopee = sInput.value.length;
                sInput.addEventListener('input', function() {
                    let currentLength = this.value.length;
                    if (currentLength - lastLengthShopee > 10) {
                        if (!this.value.endsWith('\n')) {
                            this.value += '\n';
                        }
                        this.scrollTop = this.scrollHeight;
                    }
                    lastLengthShopee = this.value.length;
                    localStorage.setItem('draft_shopee', this.value);
                });
            }

            if (tInput) {
                lastLengthTweet = tInput.value.length;
                tInput.addEventListener('input', function() {
                    let currentLength = this.value.length;
                    if (currentLength - lastLengthTweet > 10) {
                        if (!this.value.endsWith('\n')) {
                            this.value += '\n';
                        }
                        this.scrollTop = this.scrollHeight;
                    }
                    lastLengthTweet = this.value.length;
                    localStorage.setItem('draft_tweet', this.value);
                });
            }
        };

        // MESIN ALARM & NOTIFIKASI
        function toggleNotification() {
            let btn = document.getElementById('notifToggleBtn');
            let icon = document.getElementById('bellIcon');
            
            if (!("Notification" in window)) {
                alert("Browser HP lu nggak support notifikasi web bro. Harus install Capacitor Local Notifications.");
                return;
            }

            if (Notification.permission === "granted") {
                if (btn.classList.contains('active')) {
                    btn.classList.remove('active');
                    icon.innerText = 'notifications';
                    if (alarmInterval) clearInterval(alarmInterval);
                    localStorage.setItem('refal_notif_active', 'false');
                    alert("Alarm jam 10 malam dimatikan.");
                } else {
                    btn.classList.add('active');
                    icon.innerText = 'notifications_active';
                    localStorage.setItem('refal_notif_active', 'true');
                    startAlarmMachine();
                    alert("Alarm aktif! Biarkan aplikasi terbuka di background biar notif jam 10 malem bisa masuk.");
                }
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(function (permission) {
                    if (permission === "granted") {
                        btn.classList.add('active');
                        icon.innerText = 'notifications_active';
                        localStorage.setItem('refal_notif_active', 'true');
                        startAlarmMachine();
                        alert("Izin diberikan! Alarm jam 10 malam aktif.");
                    } else {
                        alert("Izin notifikasi ditolak.");
                    }
                });
            } else {
                alert("Izin notif ditolak permanen. Buka setting HP > Aplikasi > AutoMixer > Izinkan Notifikasi.");
            }
        }

        function checkNotifStatus() {
            let isActive = localStorage.getItem('refal_notif_active') === 'true';
            let btn = document.getElementById('notifToggleBtn');
            let icon = document.getElementById('bellIcon');
            if (isActive && Notification.permission === "granted") {
                btn.classList.add('active');
                icon.innerText = 'notifications_active';
                startAlarmMachine();
            }
        }

        function startAlarmMachine() {
            if (alarmInterval) clearInterval(alarmInterval);
            alarmInterval = setInterval(() => {
                let now = new Date();
                if (now.getHours() === 22 && now.getMinutes() === 0 && now.getSeconds() === 0) {
                    fireNotification();
                }
            }, 1000);
        }

        function fireNotification() {
            let options = {
                body: "Udah jam 10 malem nih bro! Waktunya post racikan link ke X.",
                icon: "https://cdn-icons-png.flaticon.com/512/3254/3254068.png", 
                vibrate: [200, 100, 200]
            };
            new Notification("Link AutoMixer", options);
        }

        function toggleDone(checkbox) {
            if (checkbox.checked) {
                checkbox.setAttribute('checked', 'checked'); 
            } else {
                checkbox.removeAttribute('checked'); 
            }

            let outputContainer = document.getElementById('outputContainer');
            currentActiveResultHTML = outputContainer.innerHTML;
            localStorage.setItem('draft_result', currentActiveResultHTML); 

            if (currentActiveHistoryId) {
                let history = JSON.parse(localStorage.getItem('refal_history')) || [];
                let index = history.findIndex(item => item.id === currentActiveHistoryId);
                if (index !== -1) {
                    history[index].html = currentActiveResultHTML;
                    localStorage.setItem('refal_history', JSON.stringify(history));
                }
            }
        }

        function shareToX(btn) {
            let racikanText = decodeURIComponent(btn.getAttribute('data-text'));
            if (navigator.share) {
                navigator.share({
                    text: racikanText
                }).catch((error) => console.log('Batal share:', error));
            } else {
                let intentUrl = `intent:#Intent;action=android.intent.action.SEND;type=text/plain;S.android.intent.extra.TEXT=${btn.getAttribute('data-text')};end`;
                window.location.href = intentUrl;
            }
        }

        async function generateAll() {
            let status = document.getElementById('status');
            let outputDiv = document.getElementById('outputContainer');
            let saveBtn = document.getElementById('saveBtn');
            let sInput = document.getElementById('inputShopee');
            let tInput = document.getElementById('inputTweet');

            if (!sInput || !tInput) {
                alert("Error: Kotak teks tidak ditemukan.");
                return;
            }

            let shopeeRaw = sInput.value.split('\n').map(s => s.trim()).filter(s => s !== '');
            let rawTweetInput = tInput.value;
            let tweetUrls = rawTweetInput.match(/(https?:\/\/[^\s]+)/g) || [];

            if (shopeeRaw.length === 0 || tweetUrls.length === 0) {
                alert("Silakan isi kedua kotak teks.");
                return;
            }

            status.innerHTML = "Memproses data...";
            outputDiv.innerHTML = '';
            saveBtn.style.display = 'none';
            currentActiveHistoryId = null; 
            localStorage.removeItem('draft_history_id');
            
            let resultHTML = '';
            let dayCounter = 1;
            let shopeeIndex = 0;
            let seenBatches = new Set(); 

            for (let url of tweetUrls) {
                try {
                    let apiUrl = url.trim().replace(/(https?:\/\/)?(www\.)?(twitter\.com|x\.com)/, 'https://api.vxtwitter.com').split('?')[0];
                    let response;
                    
                    try {
                        response = await fetch(apiUrl);
                        if (!response.ok) throw new Error("Gagal jalur utama");
                    } catch (err) {
                        let proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(apiUrl);
                        response = await fetch(proxyUrl);
                    }

                    if (!response || !response.ok) continue;
                    
                    let data = await response.json();
                    let fullText = data.text;
                    let urlRegex = /(https?:\/\/[^\s]+)/g;
                    let foundUrls = fullText.match(urlRegex) || [];

                    let caption = fullText.replace(urlRegex, '').trim();

                    if (foundUrls.length > 0) {
                        let batchLinksData = [];

                        foundUrls.forEach(u => {
                            let cleanUrl = u.replace(/["']/g, "").trim();

                            if (cleanUrl.includes('aceimg.com/upload/')) {
                                let id = cleanUrl.split('?f=')[1]; 
                                if(id) {
                                    batchLinksData.push({ url: "cdnpro.vercel.app/a/" + id, type: "vid" }); 
                                }
                            } else {
                                let myShopee = shopeeRaw[shopeeIndex % shopeeRaw.length];
                                batchLinksData.push({ url: myShopee, type: "shop" });
                                shopeeIndex++; 
                            }
                        });

                        if (batchLinksData.length > 0) {
                            let plainTextArr = [];

                            if (caption !== '') {
                                plainTextArr.push(caption);
                            }

                            batchLinksData.forEach((item, idx) => {
                                plainTextArr.push(item.url);
                            });

                            let racikanText = plainTextArr.join('\n'); 
                            let encodedTweetText = encodeURIComponent(racikanText);

                            if (!seenBatches.has(racikanText)) {
                                seenBatches.add(racikanText);

                                resultHTML += `
                                <div class="result-day">
                                    <h3>
                                        Batch ${dayCounter}
                                        <label class="posted-toggle">
                                            <input type="checkbox" onchange="toggleDone(this)">
                                            <span>Posted</span>
                                        </label>
                                    </h3>
                                    <button class="copy-btn" onclick="copyToClipboard(this, \`${racikanText}\`)">
                                        <span class="material-symbols-rounded">content_copy</span> Copy
                                    </button>
                                    
                                    <div class="result-text">${racikanText}</div>
                                    
                                    <button class="post-x-btn" onclick="shareToX(this)" data-text="${encodedTweetText}">
                                        <span class="material-symbols-rounded">share</span> Share ke X
                                    </button>
                                </div>`;
                                
                                dayCounter++;
                            }
                        }
                    }
                } catch (e) { console.log("Failed to process: " + url); }
            }

            let totalBatches = dayCounter - 1;

            if (totalBatches === 0) {
                status.innerHTML = "Proses selesai. Tidak ada URL valid.";
                return;
            }

            status.innerHTML = `Proses selesai. Berhasil membuat ${totalBatches} batch.`;
            outputDiv.innerHTML = resultHTML;
            
            currentActiveResultHTML = resultHTML;
            currentActiveItemsCount = totalBatches;
            saveBtn.style.display = 'block';

            localStorage.setItem('draft_result', resultHTML);
            localStorage.setItem('draft_count', totalBatches);
        }

        function saveCurrentToHistory() {
            if (!currentActiveResultHTML) return;
            
            let history = JSON.parse(localStorage.getItem('refal_history')) || [];
            let timestamp = new Date().toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
            
            let newRecord = {
                id: Date.now(),
                date: timestamp,
                count: currentActiveItemsCount,
                html: currentActiveResultHTML
            };
            
            history.unshift(newRecord); 
            localStorage.setItem('refal_history', JSON.stringify(history));
            
            currentActiveHistoryId = newRecord.id; 
            localStorage.setItem('draft_history_id', newRecord.id);

            document.getElementById('saveBtn').style.display = 'none';
            renderHistory();
            
            switchTab('history');
        }

        function renderHistory() {
            let history = JSON.parse(localStorage.getItem('refal_history')) || [];
            let container = document.getElementById('historyContainer');
            
            if (history.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding: 80px 20px; color: var(--md-on-surface-variant);">
                        <span class="material-symbols-rounded" style="font-size: 80px; opacity: 0.3; margin-bottom: 16px; display:block;">folder_open</span>
                        <h3 style="margin:0; font-size:18px; font-weight:500; color:var(--md-on-surface); font-family: 'Google Sans', 'Outfit', sans-serif;">Penyimpanan File Kosong</h3>
                        <p style="font-size:14px; margin-top:8px;">Belum ada history racikan link yang Anda simpan.</p>
                    </div>`;
                return;
            }
            
            let html = '<h2 style="font-size:20px; margin-bottom:20px; font-weight:500; font-family: \'Google Sans\', \'Outfit\', sans-serif;">File Tersimpan</h2>';
            history.forEach(item => {
                html += `
                <div class="history-item">
                    <div>
                        <div class="history-info">Batch Record (${item.count} Items)</div>
                        <div class="history-date">${item.date}</div>
                    </div>
                    <div class="history-actions">
                        <button class="hist-btn load-h" onclick="loadHistoryItem(${item.id})">
                            <span class="material-symbols-rounded">open_in_new</span>
                        </button>
                        <button class="hist-btn del-h" onclick="deleteHistoryItem(${item.id})">
                            <span class="material-symbols-rounded">delete</span>
                        </button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function loadHistoryItem(id) {
            let history = JSON.parse(localStorage.getItem('refal_history')) || [];
            let record = history.find(item => item.id === id);
            if (record) {
                document.getElementById('status').innerHTML = `Membuka data dari File (${record.date})`;
                document.getElementById('outputContainer').innerHTML = record.html;
                document.getElementById('saveBtn').style.display = 'none';
                
                currentActiveResultHTML = record.html;
                currentActiveItemsCount = record.count;
                currentActiveHistoryId = id; 
                
                localStorage.setItem('draft_result', record.html);
                localStorage.setItem('draft_count', record.count);
                localStorage.setItem('draft_history_id', id);
                
                switchTab('home');
                
                setTimeout(() => {
                    document.getElementById('outputContainer').scrollIntoView({ behavior: 'smooth' });
                }, 100);
            }
        }

        function deleteHistoryItem(id) {
            if(confirm("Hapus file history ini secara permanen?")) {
                let history = JSON.parse(localStorage.getItem('refal_history')) || [];
                history = history.filter(item => item.id !== id);
                localStorage.setItem('refal_history', JSON.stringify(history));
                renderHistory();
            }
        }

        function resetForm() {
            document.getElementById('inputShopee').value = '';
            document.getElementById('inputTweet').value = '';
            document.getElementById('status').innerHTML = '';
            document.getElementById('outputContainer').innerHTML = '';
            document.getElementById('saveBtn').style.display = 'none';
            
            currentActiveResultHTML = '';
            currentActiveItemsCount = 0;
            currentActiveHistoryId = null; 
            
            localStorage.removeItem('draft_shopee');
            localStorage.removeItem('draft_tweet');
            localStorage.removeItem('draft_result');
            localStorage.removeItem('draft_count');
            localStorage.removeItem('draft_history_id');
        }

        function copyToClipboard(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                let originalHtml = btn.innerHTML;
                btn.innerHTML = `<span class="material-symbols-rounded">check</span> Copied`;
                
                btn.style.backgroundColor = "var(--md-primary)"; 
                btn.style.color = "#3e001c";
                
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.style.backgroundColor = "var(--md-bg)"; 
                    btn.style.color = "var(--md-on-surface)";
                }, 1500);
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link AutoMixer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f2f4f7; color: #1c1c1e; padding: 30px 20px; max-width: 800px; margin: 0 auto; -webkit-tap-highlight-color: transparent; }
        h2 { font-size: 24px; font-weight: 700; margin-bottom: 28px; color: #111; text-align: center; }
        .box { background: #ffffff; padding: 22px; border-radius: 18px; margin-bottom: 20px; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04); }
        label { font-weight: 600; display: block; margin-bottom: 12px; font-size: 12px; color: #86868b; text-transform: uppercase; }
        textarea { width: 100%; height: 110px; border: none; border-radius: 14px; padding: 16px; font-family: ui-monospace, monospace; font-size: 13px; box-sizing: border-box; resize: none; background-color: #f5f5f7; }
        .button-group { display: flex; gap: 12px; margin-top: 24px; }
        button.action-btn { flex: 3; padding: 16px; background-color: #000000; color: #ffffff; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; }
        button.reset-btn { flex: 1; padding: 16px; background-color: #e5e5ea; color: #1c1c1e; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; }
        #status { font-weight: 500; color: #ff3b30; margin: 24px 0 10px; font-size: 14px; text-align: center; }
        .result-day { background: #ffffff; padding: 20px; margin-bottom: 16px; border-radius: 18px; position: relative; }
        .result-body { display: flex; gap: 12px; }
        .result-text { flex: 1; font-family: ui-monospace, monospace; font-size: 13px; line-height: 28px; background: #f5f5f7; padding: 12px; border-radius: 12px; }
        .test-side-panel { display: flex; flex-direction: column; gap: 6px; }
        .test-btn { width: 45px; height: 22px; border-radius: 6px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-vid { background-color: #e5f1ff; color: #007aff; }
        .btn-shop { background-color: #fff0e6; color: #ff6b00; }
        .post-x-btn { width: 100%; padding: 12px; background-color: #1da1f2; color: #ffffff; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .copy-btn { background-color: #007aff; color: #ffffff; border: none; border-radius: 20px; padding: 6px 16px; font-size: 12px; position: absolute; top: 18px; right: 20px; }
    </style>
</head>
<body>
    <h2>Link AutoMixer</h2>
    <div class="box">
        <label>Shopee Links Configuration</label>
        <textarea id="inputShopee"></textarea>
    </div>
    <div class="box">
        <label>Source URLs Extraction</label>
        <textarea id="inputTweet"></textarea>
    </div>
    <div class="button-group">
        <button class="action-btn" onclick="generateAll()">Process Links</button>
        <button class="reset-btn" onclick="resetForm()">Reset</button>
    </div>
    <div id="status"></div>
    <div id="outputContainer"></div>

    <script>
        async function generateAll() {
            let shopeeRaw = document.getElementById('inputShopee').value.split('\n').filter(s => s.trim() !== '');
            let tweetUrls = document.getElementById('inputTweet').value.match(/(https?:\/\/[^\s]+)/g) || [];
            let status = document.getElementById('status');
            let outputDiv = document.getElementById('outputContainer');
            
            if (shopeeRaw.length === 0 || tweetUrls.length === 0) return alert("Fill fields!");

            status.innerHTML = "Processing...";
            outputDiv.innerHTML = '';
            
            try {
                let url = tweetUrls[0];
                let tweetId = url.split('status/')[1].split('?')[0];
                
                // Tambahkan timeout & error log
                let controller = new AbortController();
                let id = setTimeout(() => controller.abort(), 10000);

                let response = await fetch('https://api.vxtwitter.com/' + tweetId, { signal: controller.signal });
                clearTimeout(id);

                if (!response.ok) throw new Error("API Gagal (Status: " + response.status + ")");
                
                let data = await response.json();
                let shopeeIndex = 0;
                let resultHTML = '<div class="result-day"><h3>Batch 1</h3>';
                let plainTextArr = [];
                let buttonsHTML = '<div class="test-side-panel">';

                data.text.match(/(https?:\/\/[^\s]+)/g)?.forEach((u, i) => {
                    let item = u.includes('aceimg.com/upload/') ? 
                        { url: "cdnpro.vercel.app/a/" + u.split('?f=')[1], type: "vid" } : 
                        { url: shopeeRaw[shopeeIndex++ % shopeeRaw.length], type: "shop" };
                    
                    plainTextArr.push(item.url);
                    buttonsHTML += `<button class="test-btn ${item.type === 'vid' ? 'btn-vid' : 'btn-shop'}" onclick="window.location.href='${item.url.startsWith('http') ? item.url : 'https://'+item.url}'">${item.type === 'vid' ? 'V' : 'S'}${i+1}</button>`;
                });

                buttonsHTML += '</div>';
                let racikanText = plainTextArr.join('\n');

                resultHTML += `
                    <button class="copy-btn" onclick="navigator.clipboard.writeText(\`${racikanText}\`)">Copy</button>
                    <div class="result-body">
                        <div class="result-text">${racikanText}</div>
                        ${buttonsHTML}
                    </div>
                    <button class="post-x-btn" onclick="shareToX(\`${encodeURIComponent(racikanText)}\`)">Post ke X</button>
                </div>`;

                outputDiv.innerHTML = resultHTML;
                status.innerHTML = "";
            } catch (e) {
                status.innerHTML = "ERROR: " + e.message + ". (Coba buka di Chrome browser asli, kalau di Chrome bisa berarti aplikasi pembungkusnya yang bermasalah)";
            }
        }

        function shareToX(text) {
            let decoded = decodeURIComponent(text);
            if (navigator.share) navigator.share({ text: decoded });
            else window.location.href = `intent:#Intent;action=android.intent.action.SEND;type=text/plain;S.android.intent.extra.TEXT=${text};end`;
        }

        function resetForm() {
            location.reload();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Link AutoMixer</title>
    
    <!-- Import Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

    <style>
        :root {
            /* Tema Putih (Light Theme) ala Ekosistem Google */
            --md-bg: #ffffff;
            --md-surface: #f1f3f4; 
            --md-on-surface: #1f1f1f;
            --md-on-surface-variant: #444746;
            --md-primary: #0a56d0; 
            --md-on-primary: #ffffff;
            --md-primary-container: #d3e3fd;
            --md-on-primary-container: #041e49;
            --md-secondary-container: #e1e3e1;
            --md-outline: #747775;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--md-bg); 
            color: var(--md-on-surface);
            padding: 0;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 100px; 
            overflow-x: hidden; 
        }

        h1, h2, h3, label, .nav-item span {
            font-family: 'Google Sans', 'Outfit', sans-serif;
        }

        /* Top App Bar */
        .app-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            position: sticky;
            top: 0;
            background-color: var(--md-bg);
            z-index: 10;
        }

        .app-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .app-bar h2 { 
            font-size: 22px; 
            font-weight: 500; 
            margin: 0; 
            color: var(--md-on-surface); 
        }

        .menu-icon {
            color: var(--md-on-surface-variant);
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s;
        }
        .menu-icon:active { background-color: var(--md-secondary-container); }

        .app-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-pic {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--md-primary-container);
            color: var(--md-on-primary-container);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            font-family: 'Google Sans', 'Outfit', sans-serif;
        }

        /* Main Container */
        .main-content {
            padding: 10px 24px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Hero Text */
        .hero {
            text-align: center;
            margin-bottom: 32px;
            margin-top: 16px;
            animation: fadeIn 0.4s ease;
        }
        .hero h1 {
            font-size: 26px;
            font-weight: 500;
            line-height: 1.3;
            margin: 0;
            color: var(--md-on-surface);
        }

        /* Tab System */
        #tab-home, #tab-result { display: none; animation: fadeIn 0.3s ease; }
        #tab-home.active, #tab-result.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* KOTAK BERANDA */
        .box {
            background: transparent; 
            padding: 16px 0; 
            border-radius: 0; 
            margin-bottom: 0;
            border-bottom: 1px solid var(--md-secondary-container); 
            display: flex;
            flex-direction: column;
        }

        .box label { 
            font-weight: 600; 
            font-size: 16px; 
            color: var(--md-on-surface); 
            margin-bottom: 6px; 
        }

        textarea {
            width: 100%;
            height: 120px; 
            background: transparent; 
            color: var(--md-on-surface);
            border: none; 
            font-family: 'Roboto', sans-serif; 
            font-size: 14px; 
            line-height: 1.5; 
            resize: none; 
            padding: 0; 
            border-radius: 0; 
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        textarea:focus { outline: none; }
        textarea::placeholder { color: #80868b; }

        /* Action Buttons */
        .button-group { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            gap: 16px; 
            margin-top: 16px; 
        }

        button.action-btn, button.reset-btn {
            background-color: transparent; 
            border: none;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        
        button.action-btn { color: var(--md-primary); } 
        button.reset-btn { color: var(--md-on-surface-variant); } 
        
        button.action-btn:active, button.reset-btn:active { 
            opacity: 0.6; 
            transform: scale(0.9);
        }
        
        button.action-btn .material-symbols-rounded, 
        button.reset-btn .material-symbols-rounded { 
            font-size: 26px; 
        }

        /* TOGGLE SWITCH (SAKLAR) CSS */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
            margin-right: auto; 
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--md-secondary-container);
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 26px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: var(--md-on-surface-variant);
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--md-primary-container); 
        }
        input:checked + .slider:before {
            transform: translateX(22px);
            background-color: var(--md-primary); 
        }

        /* FAB Save Button */
        button.save-btn {
            position: fixed;
            bottom: 84px; 
            right: 24px;  
            width: 56px;
            height: 56px;
            background-color: var(--md-primary); 
            color: var(--md-on-primary); 
            border: none;
            border-radius: 16px; 
            box-shadow: 0 4px 14px rgba(10, 86, 208, 0.35); 
            cursor: pointer;
            z-index: 90; 
            display: none; 
            padding: 0;
            transition: transform 0.1s, opacity 0.2s;
        }
        button.save-btn:active {
            transform: scale(0.9);
            opacity: 0.8;
        }
        button.save-btn .material-symbols-rounded {
            font-size: 28px;
            line-height: 56px; 
            display: block;
            text-align: center;
        }

        #status { font-weight: 400; color: var(--md-on-surface-variant); margin: 0 0 16px; font-size: 14px; text-align: center; }

        /* UI BATCH ala TWITTER FEED */
        .result-day {
            background: transparent; 
            padding: 16px 0; 
            margin-bottom: 0; 
            border-radius: 0; 
            border-bottom: 1px solid var(--md-secondary-container); 
            position: relative;
        }
        
        .result-day:last-child { border-bottom: none; }

        .result-day h3 { 
            margin-top: 0; 
            margin-bottom: 6px; 
            font-size: 16px; 
            font-weight: 600; 
            color: var(--md-on-surface); 
            display: flex;
            align-items: center;
        }

        .posted-toggle {
            position: absolute;
            top: 14px; 
            right: 0; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .posted-toggle input[type="checkbox"] { 
            accent-color: var(--md-primary); 
            width: 18px; 
            height: 18px; 
            margin: 0;
            cursor: pointer;
        }

        .result-text {
            font-family: 'Roboto', sans-serif; 
            font-size: 14px;
            line-height: 1.5; 
            color: var(--md-on-surface);
            background: transparent; 
            padding: 0; 
            border-radius: 0; 
            white-space: pre-wrap;
            word-break: break-all;
            margin-bottom: 12px; 
            border: none; 
        }

        .card-actions-bottom {
            display: flex;
            justify-content: flex-start; 
            gap: 28px; 
            margin-top: 0; 
        }
        .action-icon-only {
            background: transparent;
            border: none;
            padding: 4px 8px 4px 0; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, color 0.2s;
            color: var(--md-on-surface-variant); 
        }
        .action-icon-only:active {
            transform: scale(0.9);
            color: var(--md-on-surface); 
        }
        .action-icon-only .material-symbols-rounded { font-size: 18px; }

        /* DRAWER GMAIL STYLE */
        #tab-history {
            display: block !important;
            position: fixed;
            top: 0; 
            left: 0;
            width: 100vw; 
            height: 100vh;
            z-index: 1000;
            pointer-events: none; 
            background-color: rgba(0, 0, 0, 0); 
            transition: background-color 0.25s ease-out; 
        }

        #tab-history.active { 
            pointer-events: auto; 
            background-color: rgba(0, 0, 0, 0.4); 
        }

        #historyContainer {
            position: absolute;
            top: 0; 
            left: 0; 
            transform: translateX(-100%); 
            width: 80%; 
            max-width: 320px; 
            height: 100%;
            background-color: var(--md-bg);
            box-shadow: 2px 0 12px rgba(0,0,0,0.15);
            transition: transform 0.25s ease-out; 
            overflow-y: auto;
            padding: 24px 20px;
            box-sizing: border-box;
            z-index: 1001;
            will-change: transform;
        }

        #tab-history.active #historyContainer { 
            transform: translateX(0); 
        }

        /* UPDATE DESAIN LIST HISTORY */
        .history-item {
            background: var(--md-surface);
            padding: 16px 20px;
            border-radius: 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer; 
            position: relative; 
            transition: background-color 0.2s;
        }
        .history-item:active {
            background-color: var(--md-secondary-container); 
        }
        .history-info { 
            font-size: 15px; 
            font-weight: 500; 
            color: var(--md-on-surface); 
            font-family: 'Google Sans', 'Outfit', sans-serif; 
            margin-bottom: 4px;
        }
        .history-date { 
            font-size: 12px; 
            color: var(--md-on-surface-variant); 
        }
        
        .history-actions { 
            display: flex; 
            align-items: center; 
            position: relative;
        }
        
        .more-btn {
            background: transparent;
            border: none;
            color: var(--md-on-surface-variant);
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        .more-btn:active { background-color: var(--md-secondary-container); }

        /* Dropdown Menu */
        .dropdown-menu {
            position: absolute;
            right: 0;
            top: 40px;
            background: var(--md-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: none; 
            flex-direction: column;
            overflow: hidden;
            z-index: 1002;
            min-width: 140px;
        }
        .dropdown-menu button {
            background: transparent;
            border: none;
            padding: 14px 16px;
            text-align: left;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Google Sans', 'Outfit', sans-serif;
            color: var(--md-on-surface);
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .dropdown-menu button:active { background-color: var(--md-surface); }
        .dropdown-menu button.danger { color: #d93025; } 

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px; 
            background-color: var(--md-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
            border-top: 1px solid var(--md-secondary-container);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 64px;
            cursor: pointer;
            color: var(--md-on-surface-variant);
            transition: color 0.2s, transform 0.1s;
        }
        .nav-item:active {
            transform: scale(0.9);
        }

        .nav-icon-wrapper {
            width: 64px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px; 
            background-color: transparent; 
            transition: color 0.2s;
        }

        .nav-item .material-symbols-rounded { font-size: 24px; }
        
        .nav-item.active { color: var(--md-primary); }
        .nav-item.active .nav-icon-wrapper { background-color: transparent; color: var(--md-primary); }
        .nav-item.active .material-symbols-rounded { font-variation-settings: 'FILL' 1; }

    </style>
</head>
<body>

    <header class="app-bar">
        <div class="app-bar-left">
            <span class="material-symbols-rounded menu-icon" onclick="toggleHistory()">drag_handle</span>
            <h2>AutoMixer</h2>
        </div>
        <div class="app-bar-right">
            <div class="profile-pic">R</div>
        </div>
    </header>

    <main class="main-content">
        
        <!-- BERANDA TAB -->
        <div id="tab-home" class="tab-content active">
            <div class="hero">
                <h1>Penyederhanaan dan<br>manajemen link Anda</h1>
            </div>

            <div class="box">
                <label>Shopee Links</label>
                <textarea id="inputShopee" placeholder="Tempel link Shopee Anda di sini..."></textarea>
            </div>

            <div class="box">
                <label>URLs (Standar / Replace)</label>
                <textarea id="inputTweet" placeholder="Tempel link cuitan Anda di sini..."></textarea>
            </div>

            <!-- KOTAK 3 -->
            <div class="box" style="border-bottom: none;">
                <label style="color: var(--md-primary);">URLs (Gabung 2x2)</label>
                <textarea id="inputMultiTweet" placeholder="Tempel teks judul dan link video mentah di sini..."></textarea>
            </div>

            <div class="button-group">
                <label class="switch" title="Ganti Mode (Mixer / Replacer)">
                    <input type="checkbox" id="modeSwitch" onchange="toggleMode()">
                    <span class="slider"></span>
                </label>
                
                <button class="reset-btn" onclick="resetForm()" title="Reset Form">
                    <span class="material-symbols-rounded">delete_outline</span>
                </button>
                <button class="action-btn" onclick="generateAll()" title="Proses Links">
                    <span class="material-symbols-rounded">auto_awesome</span>
                </button>
            </div>
        </div>

        <!-- HASIL TAB -->
        <div id="tab-result" class="tab-content">
            <div id="status"></div>
            <!-- Tombol simpan FAB Melayang -->
            <button id="saveBtn" class="save-btn" onclick="saveCurrentToHistory()" title="Simpan ke File">
                <span class="material-symbols-rounded">save</span>
            </button>
            <div id="outputContainer"></div>
        </div>

        <!-- HISTORI / FILE TAB -->
        <div id="tab-history" class="tab-content">
            <div id="historyContainer"></div>
        </div>

    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
        <!-- Tab Beranda (Kiri) -->
        <div class="nav-item active" onclick="switchTab('home')" id="nav-home">
            <div class="nav-icon-wrapper">
                <span class="material-symbols-rounded">home</span>
            </div>
        </div>
        
        <!-- Tab Hasil (Kanan) -->
        <div class="nav-item" onclick="switchTab('result')" id="nav-result">
            <div class="nav-icon-wrapper">
                <span class="material-symbols-rounded">article</span>
            </div>
        </div>
    </nav>

    <script>
        let appMode = 'mixer'; 
        let lastActiveMainTab = 'home'; 
        let isHistoryOpen = false;

        function toggleMode() {
            let isChecked = document.getElementById('modeSwitch').checked;
            let statusDiv = document.getElementById('status');
            let heroTitle = document.querySelector('.hero h1');
            
            if (isChecked) {
                appMode = 'replacer';
                heroTitle.innerHTML = 'Clone Target dan<br>Ganti Link Shopee';
                if(statusDiv) statusDiv.innerHTML = "Mode Aktif: Clone & Replace Shopee";
            } else {
                appMode = 'mixer';
                heroTitle.innerHTML = 'Penyederhanaan dan<br>manajemen link Anda';
                if(statusDiv) statusDiv.innerHTML = "Mode Aktif: AutoMixer Standar";
            }
        }

        function toggleHistory(forceOpen) {
            const menuIcon = document.querySelector('.menu-icon');
            const historyTab = document.getElementById('tab-history');

            document.querySelectorAll('.dropdown-menu').forEach(menu => menu.style.display = 'none');

            if (forceOpen !== undefined) {
                isHistoryOpen = forceOpen;
            } else {
                isHistoryOpen = !isHistoryOpen;
            }

            if (!isHistoryOpen) {
                historyTab.classList.remove('active');
                menuIcon.innerText = 'drag_handle';
                menuIcon.style.transform = 'rotate(0deg)';
            } else {
                historyTab.classList.add('active');
                menuIcon.innerText = 'close';
                menuIcon.style.transform = 'rotate(90deg)';
            }
        }

        function switchTab(tabName) {
            if (tabName === 'history') {
                if(!isHistoryOpen) toggleHistory(true);
                return;
            }

            document.getElementById('tab-home').classList.remove('active');
            document.getElementById('tab-result').classList.remove('active');
            
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('nav-result').classList.remove('active');
            
            document.getElementById('tab-' + tabName).classList.add('active');
            document.getElementById('nav-' + tabName).classList.add('active');
            
            lastActiveMainTab = tabName; 
            window.scrollTo(0, 0);
        }

        document.getElementById('tab-history').addEventListener('click', function(e) {
            if (e.target === this && isHistoryOpen) {
                toggleHistory(false);
            }
        });

        // ========================================================
        // MESIN SWIPE REAL-TIME
        // ========================================================
        let touchStartX = 0;
        let touchStartY = 0;
        let dragStartX = 0;
        let startTime = 0;
        let isDraggingDrawer = false;
        let isSwipingTab = false;
        let isVerticalScroll = false;
        let drawerWidth = 0;

        document.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            startTime = Date.now();
            isVerticalScroll = false;
            isDraggingDrawer = false;
            isSwipingTab = false;
            drawerWidth = document.getElementById('historyContainer').offsetWidth || 320;
            
            if (isHistoryOpen) {
                let container = document.getElementById('historyContainer');
                let backdrop = document.getElementById('tab-history');
                container.style.transition = 'none';
                backdrop.style.transition = 'none';
            }
        }, {passive: true});

        document.addEventListener('touchmove', e => {
            if (!touchStartX) return;
            let currentX = e.touches[0].clientX;
            let currentY = e.touches[0].clientY;
            let diffX = currentX - touchStartX;
            let diffY = currentY - touchStartY;

            if (!isDraggingDrawer && !isSwipingTab && !isVerticalScroll) {
                if (Math.abs(diffY) > Math.abs(diffX) && Math.abs(diffY) > 8) {
                    isVerticalScroll = true; 
                } else if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 8) {
                    if (isHistoryOpen) {
                        if (diffX < 0) { 
                            isDraggingDrawer = true; 
                            dragStartX = currentX;
                        }
                    } else if (lastActiveMainTab === 'home') {
                        if (diffX > 0) {
                            isDraggingDrawer = true;
                            dragStartX = currentX;
                            document.getElementById('tab-history').style.pointerEvents = 'auto';
                            document.getElementById('historyContainer').style.transition = 'none';
                            document.getElementById('tab-history').style.transition = 'none';
                        } else {
                            isSwipingTab = true;
                        }
                    } else if (lastActiveMainTab === 'result') {
                        isSwipingTab = true;
                    }
                }
            }

            if (isDraggingDrawer) {
                let container = document.getElementById('historyContainer');
                let backdrop = document.getElementById('tab-history');
                let dragDiff = currentX - dragStartX;
                
                if (!isHistoryOpen) {
                    let moveX = Math.min(0, -100 + (dragDiff / drawerWidth) * 100);
                    container.style.transform = `translateX(${moveX}%)`;
                    backdrop.style.backgroundColor = `rgba(0,0,0,${Math.min(0.4, (dragDiff/drawerWidth)*0.4)})`;
                } else {
                    let moveX = Math.max(-100, Math.min(0, (dragDiff / drawerWidth) * 100));
                    container.style.transform = `translateX(${moveX}%)`;
                    let opacity = 0.4 + (moveX / 100) * 0.4;
                    backdrop.style.backgroundColor = `rgba(0,0,0,${Math.max(0, opacity)})`;
                }
            }
        }, {passive: true});

        document.addEventListener('touchend', e => {
            if (!touchStartX) return;
            let currentX = e.changedTouches[0].clientX;
            let diffX = currentX - touchStartX;
            let dragDiff = currentX - dragStartX;
            
            let timeTaken = Date.now() - startTime;
            let velocityX = dragDiff / timeTaken;

            if (isDraggingDrawer) {
                let container = document.getElementById('historyContainer');
                let backdrop = document.getElementById('tab-history');
                
                container.style.transition = 'transform 0.25s ease-out';
                backdrop.style.transition = 'background-color 0.25s ease-out';
                
                container.style.transform = '';
                backdrop.style.backgroundColor = '';
                backdrop.style.pointerEvents = '';
                
                if (!isHistoryOpen) {
                    if (dragDiff > drawerWidth * 0.25 || velocityX > 0.5) {
                        toggleHistory(true);
                    } else {
                        toggleHistory(false);
                    }
                } else {
                    if (dragDiff < -(drawerWidth * 0.25) || velocityX < -0.5) {
                        toggleHistory(false);
                    } else {
                        toggleHistory(true);
                    }
                }
            } else if (isSwipingTab) {
                if (diffX < -40 && lastActiveMainTab === 'home' && !isHistoryOpen) {
                    switchTab('result'); 
                } else if (diffX > 40 && lastActiveMainTab === 'result' && !isHistoryOpen) {
                    switchTab('home'); 
                }
            }
            
            touchStartX = 0;
            touchStartY = 0;
            isDraggingDrawer = false;
            isSwipingTab = false;
            isVerticalScroll = false;
        }, {passive: true});

        function toggleMenu(id, event) {
            event.stopPropagation(); 
            
            document.querySelectorAll('.dropdown-menu').forEach(menu => {
                if(menu.id !== `menu-${id}`) menu.style.display = 'none';
            });
            
            let menu = document.getElementById(`menu-${id}`);
            menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
        }

        document.addEventListener('click', function(e) {
            if(!e.target.closest('.history-actions')) {
                document.querySelectorAll('.dropdown-menu').forEach(menu => {
                    menu.style.display = 'none';
                });
            }
        });

        function renameHistoryItem(id, event) {
            event.stopPropagation();
            let history = JSON.parse(localStorage.getItem('refal_history')) || [];
            let index = history.findIndex(item => item.id === id);
            
            if (index !== -1) {
                let currentTitle = history[index].title || `Batch Record (${history[index].count} Items)`;
                let newTitle = prompt("Masukkan nama baru untuk file ini:", currentTitle);
                
                if (newTitle !== null && newTitle.trim() !== "") {
                    history[index].title = newTitle.trim();
                    localStorage.setItem('refal_history', JSON.stringify(history));
                    renderHistory(); 
                } else {
                    document.getElementById(`menu-${id}`).style.display = 'none';
                }
            }
        }

        let currentActiveResultHTML = '';
        let currentActiveItemsCount = 0;
        let lastLengthShopee = 0;
        let lastLengthTweet = 0;
        let lastLengthMulti = 0;
        let currentActiveHistoryId = null;

        window.onload = function() {
            renderHistory();
            
            let sInput = document.getElementById('inputShopee');
            let tInput = document.getElementById('inputTweet');
            let mInput = document.getElementById('inputMultiTweet');

            let draftShopee = localStorage.getItem('draft_shopee');
            if(draftShopee && sInput) sInput.value = draftShopee;

            let draftTweet = localStorage.getItem('draft_tweet');
            if(draftTweet && tInput) tInput.value = draftTweet;

            let draftMulti = localStorage.getItem('draft_multi_tweet');
            if(draftMulti && mInput) mInput.value = draftMulti;

            let draftResult = localStorage.getItem('draft_result');
            let draftCount = localStorage.getItem('draft_count');
            let savedHistoryId = localStorage.getItem('draft_history_id');

            if(draftResult) {
                document.getElementById('outputContainer').innerHTML = draftResult;
                currentActiveResultHTML = draftResult;
                currentActiveItemsCount = parseInt(draftCount || '0');
                if (savedHistoryId) currentActiveHistoryId = parseInt(savedHistoryId);
                
                document.getElementById('saveBtn').style.display = 'block';
                document.getElementById('status').innerHTML = "Data recovered from previous session.";
            }

            if (sInput) {
                lastLengthShopee = sInput.value.length;
                sInput.addEventListener('input', function() {
                    let currentLength = this.value.length;
                    if (currentLength - lastLengthShopee > 10) {
                        if (!this.value.endsWith('\n')) this.value += '\n';
                        this.scrollTop = this.scrollHeight;
                    }
                    lastLengthShopee = this.value.length;
                    localStorage.setItem('draft_shopee', this.value);
                });
            }

            if (tInput) {
                lastLengthTweet = tInput.value.length;
                tInput.addEventListener('input', function() {
                    let currentLength = this.value.length;
                    if (currentLength - lastLengthTweet > 10) {
                        if (!this.value.endsWith('\n')) this.value += '\n';
                        this.scrollTop = this.scrollHeight;
                    }
                    lastLengthTweet = this.value.length;
                    localStorage.setItem('draft_tweet', this.value);
                });
            }

            if (mInput) {
                lastLengthMulti = mInput.value.length;
                mInput.addEventListener('input', function() {
                    let currentLength = this.value.length;
                    if (currentLength - lastLengthMulti > 10) {
                        if (!this.value.endsWith('\n')) this.value += '\n';
                        this.scrollTop = this.scrollHeight;
                    }
                    lastLengthMulti = this.value.length;
                    localStorage.setItem('draft_multi_tweet', this.value);
                });
            }
        };

        function toggleDone(checkbox) {
            if (checkbox.checked) {
                checkbox.setAttribute('checked', 'checked'); 
            } else {
                checkbox.removeAttribute('checked'); 
            }

            let outputContainer = document.getElementById('outputContainer');
            currentActiveResultHTML = outputContainer.innerHTML;
            localStorage.setItem('draft_result', currentActiveResultHTML); 

            if (currentActiveHistoryId) {
                let history = JSON.parse(localStorage.getItem('refal_history')) || [];
                let index = history.findIndex(item => item.id === currentActiveHistoryId);
                if (index !== -1) {
                    history[index].html = currentActiveResultHTML;
                    localStorage.setItem('refal_history', JSON.stringify(history));
                }
            }
        }

        function shareToX(btn) {
            let racikanText = decodeURIComponent(btn.getAttribute('data-text'));
            if (navigator.share) {
                navigator.share({
                    text: racikanText
                }).catch((error) => console.log('Batal share:', error));
            } else {
                let intentUrl = `intent:#Intent;action=android.intent.action.SEND;type=text/plain;S.android.intent.extra.TEXT=${btn.getAttribute('data-text')};end`;
                window.location.href = intentUrl;
            }
        }

        // ========================================================
        // MESIN GENERATOR UTAMA
        // ========================================================
        async function generateAll() {
            let status = document.getElementById('status');
            let outputDiv = document.getElementById('outputContainer');
            let saveBtn = document.getElementById('saveBtn');
            let sInput = document.getElementById('inputShopee');
            let tInput = document.getElementById('inputTweet');
            let mInput = document.getElementById('inputMultiTweet');

            if (!sInput || !tInput || !mInput) {
                alert("Error: Kotak teks tidak ditemukan.");
                return;
            }

            let shopeeRaw = sInput.value.split('\n').map(s => s.trim()).filter(s => s !== '');
            let rawTweetInput = tInput.value;
            let rawMultiInput = mInput.value;
            
            // Regex standar yang mewajibkan awalan URL buat Kotak 2
            let tweetUrls = rawTweetInput.match(/(https?:\/\/[^\s]+)/g) || [];

            if (shopeeRaw.length === 0 || (tweetUrls.length === 0 && rawMultiInput.trim() === '')) {
                alert("Silakan isi Shopee Links dan salah satu kotak URLs.");
                return;
            }

            status.innerHTML = "Memproses data...";
            outputDiv.innerHTML = '';
            saveBtn.style.display = 'none';
            currentActiveHistoryId = null; 
            localStorage.removeItem('draft_history_id');
            
            let resultHTML = '';
            let dayCounter = 1;
            let shopeeIndex = 0;
            let seenBatches = new Set(); 

            // ======================================================
            // PROSES KOTAK 2 (URL STANDAR / REPLACER) DENGAN API TWITTER
            // ======================================================
            for (let url of tweetUrls) {
                try {
                    let apiUrl = url.trim().replace(/(https?:\/\/)?(www\.)?(twitter\.com|x\.com)/, 'https://api.vxtwitter.com').split('?')[0];
                    let response;
                    
                    try {
                        response = await fetch(apiUrl);
                        if (!response.ok) throw new Error("Gagal jalur utama");
                    } catch (err) {
                        let proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(apiUrl);
                        response = await fetch(proxyUrl);
                    }

                    if (!response || !response.ok) continue;
                    
                    let data = await response.json();
                    let fullText = data.text;
                    let urlRegex = /(https?:\/\/[^\s]+)/g;
                    let foundUrls = fullText.match(urlRegex) || [];

                    let caption = fullText.replace(urlRegex, '').trim();

                    if (foundUrls.length > 0) {
                        let batchLinksData = [];

                        foundUrls.forEach(u => {
                            let cleanUrl = u.replace(/["']/g, "").trim();

                            if (appMode === 'mixer') {
                                if (cleanUrl.includes('aceimg.com/upload/')) {
                                    let id = cleanUrl.split('?f=')[1]; 
                                    if(id) {
                                        batchLinksData.push({ url: "cdnpro.vercel.app/a/" + id, type: "vid" }); 
                                    }
                                } else {
                                    let myShopee = shopeeRaw[shopeeIndex % shopeeRaw.length];
                                    batchLinksData.push({ url: myShopee, type: "shop" });
                                    shopeeIndex++; 
                                }
                            } else {
                                if (cleanUrl.includes('aceimg.com/upload/')) {
                                    batchLinksData.push({ url: cleanUrl, type: "original" });
                                } else {
                                    let myShopee = shopeeRaw[shopeeIndex % shopeeRaw.length];
                                    batchLinksData.push({ url: myShopee, type: "shop" });
                                    shopeeIndex++; 
                                }
                            }
                        });

                        if (batchLinksData.length > 0) {
                            let plainTextArr = [];
                            if (caption !== '') plainTextArr.push(caption);

                            batchLinksData.forEach((item, idx) => {
                                let cleanDisplayUrl = item.url.replace(/^https?:\/\//i, '');
                                plainTextArr.push(cleanDisplayUrl);
                            });

                            let racikanText = plainTextArr.join('\n'); 
                            let encodedTweetText = encodeURIComponent(racikanText);

                            if (!seenBatches.has(racikanText)) {
                                seenBatches.add(racikanText);
                                resultHTML += `
                                <div class="result-day">
                                    <h3>Batch ${dayCounter}</h3>
                                    <label class="posted-toggle" title="Tandai sudah diposting">
                                        <input type="checkbox" onchange="toggleDone(this)">
                                    </label>
                                    <div class="result-text">${racikanText}</div>
                                    <div class="card-actions-bottom">
                                        <button class="action-icon-only copy-btn" onclick="copyToClipboard(this, \`${racikanText}\`)" title="Copy">
                                            <span class="material-symbols-rounded">content_copy</span>
                                        </button>
                                        <button class="action-icon-only share-btn" onclick="shareToX(this)" data-text="${encodedTweetText}" title="Share ke X">
                                            <span class="material-symbols-rounded">share</span>
                                        </button>
                                    </div>
                                </div>`;
                                dayCounter++;
                            }
                        }
                    }
                } catch (e) { console.log("Failed to process: " + url); }
            }

            // ======================================================
            // PROSES KOTAK 3 (GABUNG 2x2 TANPA WAJIB HTTPS)
            // ======================================================
            if (rawMultiInput.trim() !== '') {
                let allCaptions = [];
                let allVideoLinks = [];

                let multiLines = rawMultiInput.split('\n').map(s => s.trim()).filter(s => s !== '');
                
                // REGEX SAKTI: Bisa deteksi URL walaupun tanpa https:// di depannya
                let looseUrlRegex = /(?:https?:\/\/)?(?:www\.)?[-a-zA-Z0-9@:%._\+~#=]{1,256}\.[a-zA-Z0-9()]{2,6}\b(?:[-a-zA-Z0-9()@:%_\+.~#?&\/\/=]*)/gi;

                multiLines.forEach(line => {
                    let foundUrls = line.match(looseUrlRegex);
                    
                    if (foundUrls) {
                        foundUrls.forEach(u => {
                            if (!u.includes('shopee.co.id')) {
                                allVideoLinks.push(u.replace(/["']/g, "").trim());
                            }
                        });
                        // Hapus URL dari kalimat untuk menyisakan judul/caption
                        let captionText = line.replace(looseUrlRegex, '').trim();
                        if (captionText !== '') allCaptions.push(captionText);
                    } else {
                        // Kalau di baris itu murni teks (gak ada URL sama sekali)
                        allCaptions.push(line);
                    }
                });

                // Proses pemecahan menjadi 2 Video per batch
                let batchIndex = 0; 
                for (let i = 0; i < allVideoLinks.length; i += 2) {
                    let chunk = allVideoLinks.slice(i, i + 2); // Ambil 2 video (atau sisa 1)
                    let plainTextArr = [];
                    
                    // Putar-putar daftar judul sesuai antrean batch
                    if (allCaptions.length > 0) {
                        let currentCaption = allCaptions[batchIndex % allCaptions.length];
                        plainTextArr.push(currentCaption);
                    }

                    chunk.forEach(vidUrl => {
                        // Masukin Link Video
                        plainTextArr.push(vidUrl.replace(/^https?:\/\//i, ''));
                        
                        // Masukin Link Shopee sebagai pasangannya
                        if (shopeeRaw.length > 0) {
                            let myShopee = shopeeRaw[shopeeIndex % shopeeRaw.length];
                            plainTextArr.push(myShopee.replace(/^https?:\/\//i, ''));
                            shopeeIndex++;
                        }
                    });

                    let racikanText = plainTextArr.join('\n');
                    let encodedTweetText = encodeURIComponent(racikanText);

                    if (!seenBatches.has(racikanText)) {
                        seenBatches.add(racikanText);
                        resultHTML += `
                        <div class="result-day">
                            <h3 style="color: var(--md-primary);">Batch ${dayCounter} (Gabung 2x2)</h3>
                            <label class="posted-toggle" title="Tandai sudah diposting">
                                <input type="checkbox" onchange="toggleDone(this)">
                            </label>
                            <div class="result-text">${racikanText}</div>
                            <div class="card-actions-bottom">
                                <button class="action-icon-only copy-btn" onclick="copyToClipboard(this, \`${racikanText}\`)" title="Copy">
                                    <span class="material-symbols-rounded">content_copy</span>
                                </button>
                                <button class="action-icon-only share-btn" onclick="shareToX(this)" data-text="${encodedTweetText}" title="Share ke X">
                                    <span class="material-symbols-rounded">share</span>
                                </button>
                            </div>
                        </div>`;
                        dayCounter++;
                    }
                    batchIndex++; 
                }
            }

            let totalBatches = dayCounter - 1;

            if (totalBatches === 0) {
                status.innerHTML = "Proses selesai. Tidak ada URL valid.";
                return;
            }

            status.innerHTML = `Proses selesai. Berhasil membuat ${totalBatches} batch.`;
            outputDiv.innerHTML = resultHTML;
            
            currentActiveResultHTML = resultHTML;
            currentActiveItemsCount = totalBatches;
            saveBtn.style.display = 'block';

            localStorage.setItem('draft_result', resultHTML);
            localStorage.setItem('draft_count', totalBatches);
            
            switchTab('result');
        }

        function saveCurrentToHistory() {
            if (!currentActiveResultHTML) return;
            
            let history = JSON.parse(localStorage.getItem('refal_history')) || [];
            let timestamp = new Date().toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
            
            let newRecord = {
                id: Date.now(),
                title: `Batch Record (${currentActiveItemsCount} Items)`,
                date: timestamp,
                count: currentActiveItemsCount,
                html: currentActiveResultHTML
            };
            
            history.unshift(newRecord); 
            localStorage.setItem('refal_history', JSON.stringify(history));
            
            currentActiveHistoryId = newRecord.id; 
            localStorage.setItem('draft_history_id', newRecord.id);

            document.getElementById('saveBtn').style.display = 'none';
            renderHistory();
            
            toggleHistory(true); 
        }

        function renderHistory() {
            let history = JSON.parse(localStorage.getItem('refal_history')) || [];
            let container = document.getElementById('historyContainer');
            
            if (history.length === 0) {
                container.innerHTML = `
                    <div style="padding-bottom: 16px; margin-bottom: 16px; border-bottom: 1px solid var(--md-secondary-container);">
                        <h2 style="margin:0; font-size:22px; font-weight:500; color:var(--md-on-surface); font-family: 'Google Sans', 'Outfit', sans-serif;">File Tersimpan</h2>
                    </div>
                    <div style="text-align:center; padding: 60px 20px; color: var(--md-on-surface-variant);">
                        <span class="material-symbols-rounded" style="font-size: 80px; opacity: 0.3; margin-bottom: 16px; display:block;">folder_open</span>
                        <p style="font-size:14px; margin-top:8px;">Belum ada history racikan link yang Anda simpan.</p>
                    </div>`;
                return;
            }
            
            let html = `
                <div style="padding-bottom: 16px; margin-bottom: 16px; border-bottom: 1px solid var(--md-secondary-container);">
                    <h2 style="margin:0; font-size:22px; font-weight:500; color:var(--md-on-surface); font-family: 'Google Sans', 'Outfit', sans-serif;">File Tersimpan</h2>
                </div>`;
                
            history.forEach(item => {
                let displayTitle = item.title || `Batch Record (${item.count} Items)`;
                
                html += `
                <div class="history-item" onclick="loadHistoryItem(${item.id})">
                    <div>
                        <div class="history-info">${displayTitle}</div>
                        <div class="history-date">${item.date}</div>
                    </div>
                    <div class="history-actions">
                        <button class="more-btn" onclick="toggleMenu(${item.id}, event)">
                            <span class="material-symbols-rounded">more_vert</span>
                        </button>
                        
                        <div class="dropdown-menu" id="menu-${item.id}">
                            <button onclick="renameHistoryItem(${item.id}, event)">Ubah Nama</button>
                            <button class="danger" onclick="deleteHistoryItem(${item.id}, event)">Hapus</button>
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function loadHistoryItem(id) {
            let history = JSON.parse(localStorage.getItem('refal_history')) || [];
            let record = history.find(item => item.id === id);
            if (record) {
                let displayTitle = record.title || `Batch Record (${record.count} Items)`;
                document.getElementById('status').innerHTML = `Membuka data dari File: ${displayTitle}`;
                document.getElementById('outputContainer').innerHTML = record.html;
                document.getElementById('saveBtn').style.display = 'none';
                
                currentActiveResultHTML = record.html;
                currentActiveItemsCount = record.count;
                currentActiveHistoryId = id; 
                
                localStorage.setItem('draft_result', record.html);
                localStorage.setItem('draft_count', record.count);
                localStorage.setItem('draft_history_id', id);
                
                toggleHistory(false); 
                switchTab('result'); 
            }
        }

        function deleteHistoryItem(id, event) {
            event.stopPropagation();
            if(confirm("Hapus file history ini secara permanen?")) {
                let history = JSON.parse(localStorage.getItem('refal_history')) || [];
                history = history.filter(item => item.id !== id);
                localStorage.setItem('refal_history', JSON.stringify(history));
                renderHistory();
            } else {
                document.getElementById(`menu-${id}`).style.display = 'none';
            }
        }

        function resetForm() {
            document.getElementById('inputShopee').value = '';
            document.getElementById('inputTweet').value = '';
            document.getElementById('inputMultiTweet').value = '';
            document.getElementById('status').innerHTML = '';
            document.getElementById('outputContainer').innerHTML = '';
            document.getElementById('saveBtn').style.display = 'none';
            
            currentActiveResultHTML = '';
            currentActiveItemsCount = 0;
            currentActiveHistoryId = null; 
            
            localStorage.removeItem('draft_shopee');
            localStorage.removeItem('draft_tweet');
            localStorage.removeItem('draft_multi_tweet');
            localStorage.removeItem('draft_result');
            localStorage.removeItem('draft_count');
            localStorage.removeItem('draft_history_id');
        }

        function copyToClipboard(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                let iconSpan = btn.querySelector('.material-symbols-rounded');
                let originalIcon = iconSpan.innerText;
                
                iconSpan.innerText = 'check';
                iconSpan.style.color = 'var(--md-primary)';
                
                setTimeout(() => {
                    iconSpan.innerText = originalIcon;
                    iconSpan.style.color = '';
                }, 1500);
            });
        }
    </script>
</body>
</html>

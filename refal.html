<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link AutoMixer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f4f7; 
            color: #1c1c1e;
            padding: 30px 20px;
            max-width: 800px;
            margin: 0 auto;
            -webkit-tap-highlight-color: transparent;
        }
        
        h2 { 
            font-size: 24px; 
            font-weight: 700; 
            margin-bottom: 28px; 
            color: #111; 
            letter-spacing: -0.5px;
            text-align: center;
        }

        .box {
            background: #ffffff;
            padding: 22px;
            border-radius: 18px; 
            margin-bottom: 20px;
            border: none; 
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04); 
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        label { 
            font-weight: 600; 
            font-size: 12px; 
            color: #86868b; 
            text-transform: uppercase; 
            letter-spacing: 0.8px;
            margin-bottom: 0; 
        }

        .paste-btn {
            background-color: #f2f4f7;
            color: #1d1d1f;
            border: none;
            border-radius: 12px;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: transform 0.1s, background-color 0.2s;
        }
        .paste-btn:active { transform: scale(0.95); background-color: #e5e5ea; }
        .paste-btn svg { width: 13px; height: 13px; fill: #1d1d1f; }

        textarea {
            width: 100%;
            height: 110px;
            border: none; 
            border-radius: 14px;
            padding: 16px;
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 13px;
            box-sizing: border-box;
            resize: none; 
            background-color: #f5f5f7; 
            color: #1d1d1f;
            line-height: 1.6;
            transition: all 0.2s ease;
        }

        textarea:focus { 
            outline: none; 
            background-color: #ffffff;
            box-shadow: 0 0 0 2px #007aff;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        button.action-btn {
            flex: 3;
            padding: 16px;
            background-color: #000000; 
            color: #ffffff;
            border: none;
            border-radius: 16px; 
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 14px rgba(0,0,0,0.15);
        }

        button.action-btn:active { transform: scale(0.97); }

        button.reset-btn {
            flex: 1;
            padding: 16px;
            background-color: #e5e5ea; 
            color: #1c1c1e;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        button.reset-btn:active { transform: scale(0.97); background-color: #d1d1d6; }

        button.save-btn {
            width: 100%;
            padding: 14px;
            background-color: #34c759;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            display: none;
            transition: transform 0.1s;
            box-shadow: 0 4px 12px rgba(52, 199, 89, 0.2);
        }
        button.save-btn:active { transform: scale(0.98); }

        #status {
            font-weight: 500;
            color: #86868b;
            margin: 24px 0 10px;
            font-size: 14px;
            text-align: center;
        }

        .result-day {
            background: #ffffff;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            position: relative;
        }

        .result-day h3 { margin-top: 0; margin-bottom: 14px; font-size: 16px; font-weight: 700; color: #1d1d1f; }

        .result-body {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
        }

        .result-text {
            flex: 1;
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 13px;
            line-height: 28px;
            color: #333;
            background: #f5f5f7;
            padding: 12px 14px;
            border-radius: 12px;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 0;
        }

        .test-side-panel {
            display: flex;
            flex-direction: column;
            gap: 6px; 
            padding: 12px 0;
        }
        
        .test-btn { 
            width: 45px;
            height: 22px; 
            padding: 0;
            border-radius: 6px; 
            border: none; 
            font-size: 11px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: transform 0.1s; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .test-btn:active { transform: scale(0.92); }
        .btn-vid { background-color: #e5f1ff; color: #007aff; }
        .btn-shop { background-color: #fff0e6; color: #ff6b00; }

        .post-x-btn {
            width: 100%;
            padding: 12px;
            background-color: #1da1f2; 
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .post-x-btn:active { transform: scale(0.96); background-color: #1a91da; }

        .copy-btn {
            background-color: #007aff;
            color: #ffffff;
            border: none;
            border-radius: 20px; 
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            position: absolute;
            top: 18px;
            right: 20px;
            transition: all 0.15s;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
        }
        .copy-btn:active { transform: scale(0.92); }

        .history-section { margin-top: 40px; border-top: 1px solid #d1d1d6; padding-top: 24px; }
        .history-item {
            background: #ffffff;
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.02);
        }
        .history-info { font-size: 14px; font-weight: 500; color: #1d1d1f; }
        .history-date { font-size: 11px; color: #86868b; margin-top: 4px; }
        .history-actions { display: flex; gap: 8px; }
        .hist-btn {
            border: none; padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer;
        }
        .load-h { background-color: #f2f4f7; color: #007aff; }
        .del-h { background-color: #ffe5e5; color: #ff3b30; }
    </style>
</head>
<body>

    <h2>Link AutoMixer</h2>

    <div class="box">
        <div class="header-row">
            <label>Shopee Links Configuration</label>
            <button class="paste-btn" onclick="pasteToBox('inputShopee', this)">
                <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 18H5V5h2v3h10V5h2v16z"/></svg>
                <span>Tempel</span>
            </button>
        </div>
        <textarea id="inputShopee" placeholder="Enter Shopee links..."></textarea>
    </div>

    <div class="box">
        <div class="header-row">
            <label>Source URLs Extraction</label>
            <button class="paste-btn" onclick="pasteToBox('inputTweet', this)">
                <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 18H5V5h2v3h10V5h2v16z"/></svg>
                <span>Tempel</span>
            </button>
        </div>
        <textarea id="inputTweet" placeholder="Enter source URLs..."></textarea>
    </div>

    <div class="button-group">
        <button class="action-btn" onclick="generateAll()">Process Links</button>
        <button class="reset-btn" onclick="resetForm()">Reset</button>
    </div>

    <div id="status"></div>

    <button id="saveBtn" class="save-btn" onclick="saveCurrentToHistory()">Save to History</button>

    <div id="outputContainer"></div>

    <div class="history-section">
        <label>Saved History</label>
        <div id="historyContainer"></div>
    </div>

    <script>
        let currentActiveResultHTML = '';
        let currentActiveItemsCount = 0;

        window.onload = function() {
            renderHistory();
            
            let sInput = document.getElementById('inputShopee');
            let tInput = document.getElementById('inputTweet');

            let draftShopee = localStorage.getItem('draft_shopee');
            if(draftShopee && sInput) sInput.value = draftShopee;

            let draftTweet = localStorage.getItem('draft_tweet');
            if(draftTweet && tInput) tInput.value = draftTweet;

            let draftResult = localStorage.getItem('draft_result');
            let draftCount = localStorage.getItem('draft_count');
            if(draftResult) {
                document.getElementById('outputContainer').innerHTML = draftResult;
                currentActiveResultHTML = draftResult;
                currentActiveItemsCount = parseInt(draftCount || '0');
                document.getElementById('saveBtn').style.display = 'block';
                document.getElementById('status').innerHTML = "Data recovered from previous session.";
            }

            if (sInput) {
                sInput.addEventListener('input', function() {
                    localStorage.setItem('draft_shopee', this.value);
                });
            }

            if (tInput) {
                tInput.addEventListener('input', function() {
                    localStorage.setItem('draft_tweet', this.value);
                });
            }
        };

        // FUNGSI TEMPEL (DIPERBAIKI 100% AMAN)
        async function pasteToBox(targetId, btnElement) {
            try {
                if (!navigator.clipboard || !navigator.clipboard.readText) {
                    alert("Browser kamu tidak mendukung fitur Tempel otomatis. Silakan tahan kotaknya lalu pilih 'Tempel' secara manual.");
                    return;
                }
                
                let text = await navigator.clipboard.readText();
                if (text) {
                    let textarea = document.getElementById(targetId);
                    if (textarea.value.trim() !== '') {
                        textarea.value += '\n' + text;
                    } else {
                        textarea.value = text;
                    }
                    
                    // Simpan otomatis ke draft
                    textarea.dispatchEvent(new Event('input'));

                    // Efek Berhasil (Hijau)
                    let originalBg = btnElement.style.backgroundColor;
                    let span = btnElement.querySelector('span');
                    
                    btnElement.style.backgroundColor = '#d4f5d6';
                    span.innerText = 'Berhasil';
                    
                    setTimeout(() => { 
                        btnElement.style.backgroundColor = originalBg; 
                        span.innerText = 'Tempel';
                    }, 800);
                }
            } catch (err) {
                alert("Izin ditolak! Pastikan kamu mengizinkan (Allow) web ini untuk mengakses clipboard saat muncul notifikasi.");
            }
        }

        function shareToX(btn) {
            let racikanText = decodeURIComponent(btn.getAttribute('data-text'));
            if (navigator.share) {
                navigator.share({
                    text: racikanText
                }).catch((error) => console.log('Batal share:', error));
            } else {
                let intentUrl = `intent:#Intent;action=android.intent.action.SEND;type=text/plain;S.android.intent.extra.TEXT=${btn.getAttribute('data-text')};end`;
                window.location.href = intentUrl;
            }
        }

        async function generateAll() {
            let status = document.getElementById('status');
            let outputDiv = document.getElementById('outputContainer');
            let saveBtn = document.getElementById('saveBtn');
            let sInput = document.getElementById('inputShopee');
            let tInput = document.getElementById('inputTweet');

            if (!sInput || !tInput) {
                alert("Error: Kotak teks tidak ditemukan.");
                return;
            }

            let shopeeRaw = sInput.value.split('\n').map(s => s.trim()).filter(s => s !== '');
            let rawTweetInput = tInput.value;
            let tweetUrls = rawTweetInput.match(/(https?:\/\/[^\s]+)/g) || [];

            if (shopeeRaw.length === 0 || tweetUrls.length === 0) {
                alert("Please fill in both fields.");
                return;
            }

            status.innerHTML = "Processing data...";
            outputDiv.innerHTML = '';
            saveBtn.style.display = 'none';
            
            let resultHTML = '';
            let dayCounter = 1;
            let shopeeIndex = 0;
            let seenBatches = new Set(); 

            for (let url of tweetUrls) {
                try {
                    let apiUrl = url.trim().replace(/(https?:\/\/)?(www\.)?(twitter\.com|x\.com)/, 'https://api.vxtwitter.com').split('?')[0];
                    let response;
                    
                    // COBA JALUR UTAMA
                    try {
                        response = await fetch(apiUrl);
                        if (!response.ok) throw new Error("Gagal jalur utama");
                    } catch (err) {
                        // JALUR CADANGAN (ALLORIGINS) JIKA SERVER TWITTER NOLAK
                        let proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(apiUrl);
                        response = await fetch(proxyUrl);
                    }

                    if (!response || !response.ok) continue;
                    
                    let data = await response.json();
                    let fullText = data.text;
                    let urlRegex = /(https?:\/\/[^\s]+)/g;
                    let foundUrls = fullText.match(urlRegex) || [];

                    if (foundUrls.length > 0) {
                        let batchLinksData = [];

                        foundUrls.forEach(u => {
                            let cleanUrl = u.replace(/["']/g, "").trim();

                            if (cleanUrl.includes('aceimg.com/upload/')) {
                                let id = cleanUrl.split('?f=')[1]; 
                                if(id) {
                                    batchLinksData.push({ url: "cdnpro.vercel.app/a/" + id, type: "vid" }); 
                                }
                            } else {
                                let myShopee = shopeeRaw[shopeeIndex % shopeeRaw.length];
                                batchLinksData.push({ url: myShopee, type: "shop" });
                                shopeeIndex++; 
                            }
                        });

                        if (batchLinksData.length > 0) {
                            let plainTextArr = [];
                            let testButtonsHTML = `<div class="test-side-panel">`;

                            batchLinksData.forEach((item, idx) => {
                                plainTextArr.push(item.url);
                                let href = item.url.startsWith('http') ? item.url : 'https://' + item.url;
                                
                                let btnClass = item.type === 'vid' ? 'btn-vid' : 'btn-shop';
                                let btnText = item.type === 'vid' ? 'V' + (idx+1) : 'S' + (idx+1);
                                
                                testButtonsHTML += `<button class="test-btn ${btnClass}" onclick="window.location.href='${href}'">${btnText}</button>`;
                            });
                            testButtonsHTML += `</div>`;

                            let racikanText = plainTextArr.join('\n'); 
                            let encodedTweetText = encodeURIComponent(racikanText);

                            if (!seenBatches.has(racikanText)) {
                                seenBatches.add(racikanText);

                                resultHTML += `
                                <div class="result-day">
                                    <h3>Batch ${dayCounter}</h3>
                                    <button class="copy-btn" onclick="copyToClipboard(this, \`${racikanText}\`)">Copy</button>
                                    
                                    <div class="result-body">
                                        <div class="result-text">${racikanText}</div>
                                        ${testButtonsHTML}
                                    </div>
                                    
                                    <button class="post-x-btn" onclick="shareToX(this)" data-text="${encodedTweetText}">
                                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                                        Share ke X
                                    </button>
                                </div>`;
                                
                                dayCounter++;
                            }
                        }
                    }
                } catch (e) { console.log("Failed to process: " + url); }
            }

            let totalBatches = dayCounter - 1;

            if (totalBatches === 0) {
                status.innerHTML = "Process completed. No valid source URLs found.";
                return;
            }

            status.innerHTML = `Process completed. Extracted ${totalBatches} batches.`;
            outputDiv.innerHTML = resultHTML;
            
            currentActiveResultHTML = resultHTML;
            currentActiveItemsCount = totalBatches;
            saveBtn.style.display = 'block';

            localStorage.setItem('draft_result', resultHTML);
            localStorage.setItem('draft_count', totalBatches);
        }

        function saveCurrentToHistory() {
            if (!currentActiveResultHTML) return;
            
            let history = JSON.parse(localStorage.getItem('refal_history')) || [];
            let timestamp = new Date().toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
            
            let newRecord = {
                id: Date.now(),
                date: timestamp,
                count: currentActiveItemsCount,
                html: currentActiveResultHTML
            };
            
            history.unshift(newRecord); 
            localStorage.setItem('refal_history', JSON.stringify(history));
            
            document.getElementById('saveBtn').style.display = 'none';
            renderHistory();
        }

        function renderHistory() {
            let history = JSON.parse(localStorage.getItem('refal_history')) || [];
            let container = document.getElementById('historyContainer');
            
            if (history.length === 0) {
                container.innerHTML = '<div style="color:#86868b; font-size:13px; text-align:center; padding:10px;">No saved history available.</div>';
                return;
            }
            
            let html = '';
            history.forEach(item => {
                html += `
                <div class="history-item">
                    <div>
                        <div class="history-info">Batch Record (${item.count} Items)</div>
                        <div class="history-date">${item.date}</div>
                    </div>
                    <div class="history-actions">
                        <button class="hist-btn load-h" onclick="loadHistoryItem(${item.id})">Open</button>
                        <button class="hist-btn del-h" onclick="deleteHistoryItem(${item.id})">Delete</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function loadHistoryItem(id) {
            let history = JSON.parse(localStorage.getItem('refal_history')) || [];
            let record = history.find(item => item.id === id);
            if (record) {
                document.getElementById('status').innerHTML = `Viewing record from history (${record.date})`;
                document.getElementById('outputContainer').innerHTML = record.html;
                document.getElementById('saveBtn').style.display = 'none';
                document.getElementById('outputContainer').scrollIntoView({ behavior: 'smooth' });
                
                currentActiveResultHTML = record.html;
                currentActiveItemsCount = record.count;
                localStorage.setItem('draft_result', record.html);
                localStorage.setItem('draft_count', record.count);
            }
        }

        function deleteHistoryItem(id) {
            if(confirm("Hapus catatan riwayat ini?")) {
                let history = JSON.parse(localStorage.getItem('refal_history')) || [];
                history = history.filter(item => item.id !== id);
                localStorage.setItem('refal_history', JSON.stringify(history));
                renderHistory();
            }
        }

        function resetForm() {
            document.getElementById('inputShopee').value = '';
            document.getElementById('inputTweet').value = '';
            document.getElementById('status').innerHTML = '';
            document.getElementById('outputContainer').innerHTML = '';
            document.getElementById('saveBtn').style.display = 'none';
            currentActiveResultHTML = '';
            currentActiveItemsCount = 0;
            
            localStorage.removeItem('draft_shopee');
            localStorage.removeItem('draft_tweet');
            localStorage.removeItem('draft_result');
            localStorage.removeItem('draft_count');
        }

        function copyToClipboard(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                let originalText = btn.innerText;
                btn.innerText = "Copied ✓";
                
                btn.style.backgroundColor = "#34c759"; 
                btn.style.boxShadow = "0 2px 8px rgba(52, 199, 89, 0.3)";
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.backgroundColor = ""; 
                    btn.style.boxShadow = "";
                }, 1500);
            });
        }
    </script>
</body>
</html>

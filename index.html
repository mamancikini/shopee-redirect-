<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
        const fullPath = window.location.pathname;

        // 1. KAMUS JEBAKAN SHOPEE
        const shopeeLinks = {
            'v1RuS9x': 'https://s.shopee.co.id/4ftzLEBzIC',
            'x7BqP2m': 'https://s.shopee.co.id/9UzF6ArQDt',
            'k9LwZ5c': 'https://s.shopee.co.id/2BCeMipabP',
            'm4YtN8r': 'https://s.shopee.co.id/5VT6KryUik'
        };

        // Ambil ID murni paling belakang (Contoh: dari "/e/v1RuS9x.mp4" mesin cuma ngambil "v1RuS9x")
        const parts = fullPath.split('/');
        const cleanID = parts[parts.length - 1].replace('.mp4', '');

        // 2. MESIN PENGECEK SUPER BINGUNG
        if (shopeeLinks.hasOwnProperty(cleanID)) {
            // Kalau buntutnya adalah ID jebakan, bodo amat depannya folder apa, GASS KE SHOPEE!
            window.location.replace(shopeeLinks[cleanID]);
            
        } else if (fullPath.startsWith('/s/')) {
            window.location.replace("https://cdn.slicidrive.com/" + cleanID + ".mp4");
            
        } else if (fullPath.startsWith('/a/')) {
            window.location.replace("https://cdn2.acesimg.com/" + cleanID + ".mp4");
            
        } else if (fullPath.startsWith('/v/')) {
            window.location.replace("https://vdaq.de/e/" + cleanID);
            
        } else if (fullPath.startsWith('/q/')) {
            window.location.replace("https://cdn2.qceimg.com/" + cleanID + ".mp4");
            
        } else {
            // Default nyasar
            window.location.replace("https://cdn2.acesimg.com/" + cleanID + ".mp4");
        }
    </script>
</head>
<body style="background: #000;"></body>
</html>

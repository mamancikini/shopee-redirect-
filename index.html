<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
        // Ambil ID dari URL (misal: /sJzbXeW7.mp4 -> ngambil 'sJzbXeW7')
        const path = window.location.pathname.replace('/', '').replace('.mp4', '');

        // DAFTAR KODE JEBAKAN SHOPEE LU
        const shopeeIDs = ['sJzbXeW7'];

        if (shopeeIDs.includes(path)) {
            // Kalau kodenya cocok, langsung gas ke keranjang oren
            window.location.replace("https://s.shopee.co.id/5VRR5l2tFB");
        } else {
            // Kalau kodenya beda, otomatis tembusin ke video asli Videy
            window.location.replace("https://cdn2.videy.co/" + path + ".mp4");
        }
    </script>
</head>
<body style="background: #000;"></body>
</html>
